<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020806">
  <title>EratGuard Admin</title>

  <style>
    :root{
      --bg:#020806;
      --green:#31f99e;
      --lime:#9cff5d;
      --text:#f3fff8;
      --muted:rgba(230,255,240,.70);
      --glass:rgba(4,22,15,.68);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 33%, rgba(49,249,158,.18), transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(156,255,93,.10), transparent 23%),
        radial-gradient(circle at 85% 78%, rgba(49,249,158,.10), transparent 23%),
        linear-gradient(180deg,#010403,#03120d 55%,#010403);
      overflow:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.78) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(49,249,158,.46) 0 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,255,255,.18) 0 1px, transparent 1.5px);
      background-size:72px 72px,118px 118px,43px 43px;
      background-position:0 0,30px 20px,12px 8px;
      opacity:.38;
      pointer-events:none;
    }

    body:after{
      content:"";
      position:fixed;
      left:-10%;
      right:-10%;
      bottom:-26%;
      height:42%;
      background:
        radial-gradient(ellipse at center, rgba(49,249,158,.22), rgba(49,249,158,.05) 25%, transparent 60%);
      border-top:1px solid rgba(49,249,158,.28);
      pointer-events:none;
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100dvh;
      padding:calc(env(safe-area-inset-top) + 22px) 14px calc(env(safe-area-inset-bottom) + 14px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .topbar{
      width:min(840px,100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:2px 10px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:13px;
      min-width:0;
    }

    .brand-icon{
      width:58px;
      height:58px;
      border-radius:18px;
      background:
        radial-gradient(circle at 30% 25%, rgba(156,255,93,.18), transparent 30%),
        linear-gradient(180deg, rgba(8,35,23,.94), rgba(0,0,0,.78));
      border:1px solid rgba(156,255,93,.50);
      box-shadow:0 0 18px rgba(49,249,158,.34), inset 0 0 22px rgba(49,249,158,.10);
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .brand-icon svg{width:39px;height:39px;filter:drop-shadow(0 0 6px rgba(49,249,158,.45))}
    .brand-title{line-height:1.02}
    .brand-title strong{
      display:block;
      font-size:clamp(27px,7.6vw,40px);
      letter-spacing:-.055em;
      white-space:nowrap;
      text-shadow:0 0 12px rgba(255,255,255,.10);
    }
    .brand-title strong span{color:var(--lime)}
    .brand-title small{
      display:block;
      margin-top:5px;
      color:rgba(238,255,244,.68);
      font-size:clamp(13px,3.55vw,17px);
      white-space:nowrap;
    }

    .admin-pill{
      display:flex;
      align-items:center;
      gap:8px;
      padding:11px 13px;
      border-radius:17px;
      color:var(--lime);
      border:1px solid rgba(49,249,158,.30);
      background:linear-gradient(180deg, rgba(9,36,23,.70), rgba(4,18,12,.58));
      font-weight:850;
      font-size:13px;
      white-space:nowrap;
    }

    .admin-pill i{
      width:8px;height:8px;border-radius:99px;background:#8cff45;
      box-shadow:0 0 10px #8cff45;
    }

    .wheel-wrap{
      position:relative;
      width:min(94vw,610px);
      aspect-ratio:1/1;
      margin-top:-7px;
      display:grid;
      place-items:center;
    }

    .orbit{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.22);
      box-shadow:0 0 35px rgba(49,249,158,.08), inset 0 0 55px rgba(49,249,158,.05);
      opacity:.50;
    }

    .orbit:before,
    .orbit:after{
      content:"";
      position:absolute;
      inset:6%;
      border-radius:50%;
      border:1px dashed rgba(156,255,93,.15);
    }
    .orbit:after{inset:13%;border-style:solid;border-color:rgba(49,249,158,.12)}

    .real-slice-wheel{
      position:absolute;
      inset:-8.5%;
      width:117%;
      height:117%;
      z-index:0;
      pointer-events:none;
      opacity:.90;
      filter:none;
    }

    .real-slice{
      fill:url(#sliceFill);
      stroke:#8cff62;
      stroke-width:2.65;
      stroke-linejoin:round;
      opacity:.68;
      filter:none;
    }

    .real-ring{
      fill:none;
      stroke:rgba(156,255,93,.22);
      stroke-width:1.4;
      stroke-dasharray:3 9;
      opacity:.48;
    }

    .real-inner-ring{
      fill:none;
      stroke:rgba(49,249,158,.26);
      stroke-width:1.8;
      opacity:.48;
    }

    .slices{
      position:absolute;
      inset:0;
      border-radius:50%;
      z-index:2;
    }

    .slice{
      position:absolute;
      left:50%;
      top:50%;
      width:31.6%;
      height:31.6%;
      translate:-50% -50%;
      transform:rotate(var(--a)) translateY(-105.5%) rotate(calc(-1 * var(--a)));
      text-decoration:none;
      color:var(--text);
      outline:none;
    }

    .slice-card{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      padding:8px 6px 7px;
      background:transparent;
      border:none;
      box-shadow:none;
    }

    .slice .ico{
      width:clamp(30px,8.5vw,44px);
      height:clamp(30px,8.5vw,44px);
      fill:none;
      stroke:#b7ff84;
      stroke-width:2.75;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:
        drop-shadow(0 0 1px rgba(156,255,93,.28))
        drop-shadow(0 0 3px rgba(49,249,158,.12));
    }

    .label{
      font-size:clamp(11.8px,3.28vw,15px);
      font-weight:800;
      letter-spacing:-.035em;
      text-align:center;
      line-height:1.05;
      max-width:105px;
      text-shadow:0 1px 2px rgba(0,0,0,.96), 0 0 3px rgba(0,0,0,.80);
    }

    .under{
      width:32px;
      height:2px;
      border-radius:99px;
      background:linear-gradient(90deg, transparent, #aaff5f, transparent);
      opacity:.68;
      box-shadow:0 0 4px rgba(140,255,69,.30);
    }

    .hub{
      position:absolute;
      width:29.2%;
      aspect-ratio:1/1;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 50% 42%, rgba(180,255,99,.28), rgba(4,40,22,.80) 56%, rgba(1,8,5,.96) 76%);
      border:2px solid rgba(173,255,111,.72);
      box-shadow:
        0 0 18px rgba(126,255,71,.48),
        0 0 54px rgba(49,249,158,.16),
        inset 0 0 26px rgba(49,249,158,.22);
      z-index:4;
    }

    .hub:before{
      content:"";
      position:absolute;
      inset:-16%;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.28);
      background:repeating-conic-gradient(from 0deg, rgba(49,249,158,.26) 0 1deg, transparent 1deg 7deg);
      mask:radial-gradient(circle, transparent 56%, black 57%);
      opacity:.72;
    }

    .hub:after{
      content:"";
      position:absolute;
      inset:-31%;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.16);
    }

    .hub strong{
      position:relative;
      z-index:2;
      font-size:clamp(31px,9.2vw,66px);
      line-height:1;
      font-weight:950;
      letter-spacing:-.06em;
      color:#f4fff7;
      text-shadow:0 0 10px rgba(156,255,93,.48), 0 2px 0 rgba(0,0,0,.28);
    }

    .status-card{
      width:min(94%,620px);
      margin-top:2px;
      border-radius:18px;
      padding:11px 13px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.06), transparent 20%),
        linear-gradient(180deg, rgba(5,30,19,.70), rgba(2,12,8,.64));
      border:1px solid rgba(49,249,158,.26);
      box-shadow:0 0 22px rgba(49,249,158,.10), inset 0 0 22px rgba(49,249,158,.06);
      display:flex;
      align-items:center;
      gap:12px;
    }

    .status-icon{
      width:48px;height:48px;border-radius:16px;
      display:grid;place-items:center;
      color:#9cff5d;
      font-size:27px;
      background:rgba(49,249,158,.06);
      border:1px solid rgba(49,249,158,.26);
      flex:0 0 auto;
    }

    .status-title{
      font-size:clamp(18px,5vw,24px);
      font-weight:900;
      letter-spacing:-.045em;
    }

    .status-sub{
      margin-top:2px;
      color:#76ff42;
      font-size:clamp(13px,3.7vw,17px);
      font-weight:750;
    }

    @media (max-width:460px){
      .topbar{
        padding-left:10px;
        padding-right:8px;
      }
      .admin-pill{display:none}
      .wheel-wrap{width:min(94vw,610px)}
    }
  </style>

<style id="admin-center-flip-style">
/* ===== ADMIN CENTER FLIP FINAL ===== */
.admin-center-flip{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1200px;
}

.admin-flip-stage{
  position:relative;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform 1.25s cubic-bezier(.22,.61,.36,1);
}

.admin-flip-stage.is-flipped{
  transform:rotateY(180deg);
}

.admin-flip-face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:50%;
}

.admin-flip-front{
  color:#ffffff;
  font-weight:1000;
  letter-spacing:-1px;
  text-shadow:
    0 0 10px rgba(255,255,255,.18),
    0 0 24px rgba(140,255,90,.22);
}

.admin-flip-front span{
  display:block;
  font-size:clamp(32px, 8vw, 60px);
  line-height:1;
}

.admin-flip-back{
  transform:rotateY(180deg);
}

.admin-flip-back img{
  width:82%;
  height:82%;
  object-fit:cover;
  border-radius:50%;
  border:2px solid rgba(140,255,90,.45);
  box-shadow:
    0 0 0 4px rgba(140,255,90,.08),
    0 0 28px rgba(80,255,60,.18);
}

/* Merkez yazı alanı çok büyük font veriyorsa kontrol et */
.admin-center-flip,
.admin-center-flip *{
  line-height:1 !important;
}
</style>

</head>

<style id="admin-status-card-final-fix">
  /* ===== ADMIN STATUS CARD FINAL FIX ===== */

  .status-card{
    margin-top:-6px !important;
    align-items:center !important;
  }

  .status-card > div:last-child{
    transform:translateY(4px) !important;
  }

  .status-icon{
    color:transparent !important;
    font-size:0 !important;
  }

  .status-shield{
    width:31px !important;
    height:31px !important;
    fill:none !important;
    stroke:#9cff5d !important;
    stroke-width:3.2 !important;
    stroke-linecap:round !important;
    stroke-linejoin:round !important;
    filter:
      drop-shadow(0 0 2px rgba(156,255,93,.30))
      drop-shadow(0 0 6px rgba(49,249,158,.16)) !important;
  }

  body:after{
    display:none !important;
  }

  @media (max-width:460px){
    .status-card > div:last-child{
      transform:translateY(4px) !important;
    }

    .status-shield{
      width:30px !important;
      height:30px !important;
    }
  }
</style>


<style id="admin-radial-no-native-link-highlight">
  .slice,
  .slice *,
  .slice-card,
  .slice-card * {
    -webkit-tap-highlight-color: transparent !important;
    -webkit-touch-callout: none !important;
    -webkit-user-select: none !important;
    user-select: none !important;
    outline: none !important;
    box-shadow: none !important;
    text-decoration: none !important;
  }

  .slice:focus,
  .slice:active,
  .slice:hover,
  .slice:focus-visible,
  .slice-card:focus,
  .slice-card:active,
  .slice-card:hover {
    outline: none !important;
    box-shadow: none !important;

<script id="admin-radial-no-native-link-highlight-js">
(function(){
  function go(el){
    var url = el.getAttribute("data-href");
    if(url && url !== "#" && url !== "javascript:void(0)"){
      window.location.href = url;
    }
  }

  document.querySelectorAll("a.slice").forEach(function(el){
    el.setAttribute("tabindex", "-1");
    el.setAttribute("role", "button");

    ["touchstart","pointerdown","mousedown"].forEach(function(ev){
      el.addEventListener(ev, function(e){
        try { e.preventDefault(); } catch(_) {}
        try { el.blur(); } catch(_) {}
      }, {passive:false});
    });

    el.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();
      try { el.blur(); } catch(_) {}
      go(el);
    }, true);

    el.addEventListener("touchend", function(e){
      e.preventDefault();
      e.stopPropagation();
      try { el.blur(); } catch(_) {}
      go(el);
    }, {passive:false});
  });
})();
</script>
