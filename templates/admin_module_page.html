<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>EratGuard Admin Module</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  background:#020817;
  color:#eafcff;
  font-family:Arial,Helvetica,sans-serif;
}
body{
  background:
    radial-gradient(circle at 50% 22%,rgba(0,190,255,.22),transparent 32%),
    linear-gradient(180deg,#07244e,#020817 68%,#00030a);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(80,200,255,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(80,200,255,.045) 1px,transparent 1px);
  background-size:32px 32px;
}
.wrap{
  width:min(960px,100%);
  min-height:100vh;
  margin:0 auto;
  padding:18px 14px 34px;
}
.top{
  border:1px solid rgba(110,220,255,.32);
  border-radius:18px;
  padding:18px;
  background:linear-gradient(135deg,rgba(6,40,88,.86),rgba(2,12,34,.92));
  box-shadow:0 0 34px rgba(0,160,255,.18),inset 0 0 50px rgba(0,130,255,.08);
}
.back{
  display:inline-flex;
  color:#9ff3ff;
  text-decoration:none;
  border:1px solid rgba(120,230,255,.30);
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  letter-spacing:.08em;
  margin-bottom:18px;
  background:rgba(0,20,48,.58);
}
.badge{
  color:#6ee9ff;
  font-size:11px;
  letter-spacing:.28em;
  margin-bottom:10px;
}
h1{
  font-size:34px;
  line-height:1.08;
  color:white;
  text-shadow:0 0 18px rgba(90,230,255,.65);
}
.sub{
  margin-top:10px;
  color:rgba(220,245,255,.68);
  font-size:15px;
  line-height:1.45;
}
.grid{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.card{
  border:1px solid rgba(100,210,255,.28);
  border-radius:16px;
  padding:16px;
  min-height:96px;
  background:rgba(0,17,45,.72);
  box-shadow:inset 0 0 24px rgba(0,140,255,.07);
}
.card strong{
  display:block;
  color:#72efff;
  font-size:24px;
  margin-bottom:8px;
  text-shadow:0 0 14px rgba(0,220,255,.75);
}
.card span{
  color:rgba(220,245,255,.62);
  font-size:12px;
}
.panel{
  margin-top:18px;
  border:1px solid rgba(100,210,255,.24);
  border-radius:18px;
  padding:18px;
  background:rgba(0,14,38,.72);
}
.panel h2{
  font-size:18px;
  margin-bottom:12px;
  color:#fff;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-top:1px solid rgba(110,220,255,.13);
  padding:12px 0;
  color:rgba(230,250,255,.78);
  font-size:13px;
}
.row:first-of-type{border-top:0}
.ok{color:#79ffb0}
.warn{color:#ffe17a}
@media(max-width:700px){
  .wrap{padding:12px 10px 26px}
  h1{font-size:27px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .card{min-height:86px;padding:14px}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/ac?v=hud7">← Admin Command Center</a>

  <section class="top">
    <div class="badge">ERATGUARD ADMIN · MODULE PAGE · V7</div>
    <h1>{{ title }}</h1>
    <div class="sub">{{ desc }}</div>

    <div class="grid">
      <div class="card"><strong>{{ stat1 }}</strong><span>{{ label1 }}</span></div>
      <div class="card"><strong>{{ stat2 }}</strong><span>{{ label2 }}</span></div>
      <div class="card"><strong>{{ stat3 }}</strong><span>{{ label3 }}</span></div>
      <div class="card"><strong>{{ stat4 }}</strong><span>{{ label4 }}</span></div>
    </div>
  </section>

  <section class="panel">
    <h2>Canlı Kontrol</h2>
    <div class="row"><span>Modül durumu</span><b class="ok">AKTİF</b></div>
    <div class="row"><span>Admin tema</span><b>BLUE HUD V7</b></div>
    <div class="row"><span>Play upload key reset</span><b class="warn">BEKLEMEDE</b></div>
    <div class="row"><span>Son işlem</span><b>{{ action }}</b></div>
  </section>
</div>
</body>
</html>
