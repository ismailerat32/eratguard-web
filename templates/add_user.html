<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kullanıcı Ekle</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff}
.topbar{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(15,23,42,.9);backdrop-filter:blur(12px);border-bottom:1px solid #23324b;display:flex;align-items:center;padding:0 14px;z-index:1100}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{background:#1f2937;border:1px solid #2a3a57;color:#fff;font-size:22px;width:44px;height:44px;border-radius:14px;cursor:pointer}
.brand{font-size:22px;font-weight:800}
.sidebar{position:fixed;top:64px;left:0;width:88px;height:calc(100vh - 64px);background:rgba(15,23,42,.88);backdrop-filter:blur(10px);border-right:1px solid #23324b;padding:14px 10px;overflow-y:auto;transition:width .25s ease,left .25s ease;z-index:1000}
.sidebar.expanded{width:230px}
.sidebar a{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;background:#1c2739;border:1px solid #23324b;padding:13px 14px;border-radius:16px;margin-bottom:10px;white-space:nowrap;overflow:hidden}
.sidebar a:hover,.sidebar a.active{background:#2563eb}
.icon{font-size:24px;min-width:28px;text-align:center}
.label{opacity:0;transition:opacity .2s ease;font-size:16px;font-weight:600}
.sidebar.expanded .label{opacity:1}
.content{margin-top:64px;margin-left:88px;padding:18px;transition:margin-left .25s ease}
.content.expanded{margin-left:230px}
.card{background:#10192c;border:1px solid #23324b;border-radius:22px;padding:22px;max-width:760px}
label{display:block;margin:12px 0 6px;color:#cbd5e1}
input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:#fff}
button{margin-top:16px;width:100%;padding:12px;border:none;border-radius:12px;background:#16a34a;color:#fff;font-weight:bold;cursor:pointer}
.ok{background:#14532d;padding:10px;border-radius:10px;margin-bottom:12px}
.err{background:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:12px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.60);backdrop-filter:blur(3px);z-index:900}
.overlay.show{display:block}
@media (max-width:768px){
    .brand{font-size:18px}
    .sidebar{left:-240px;width:220px}
    .sidebar.expanded{left:0;width:220px}
    .label{opacity:1}
    .content{margin-left:0;padding:14px}
    .content.expanded{margin-left:0}
}
</style>
</head>
<body>
<div class="topbar">
    <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="brand">🛡 EratGuard</div>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeSidebarMobile()"></div>

<div id="sidebar" class="sidebar">
    <a href="/dashboard"><span class="icon">🏠</span><span class="label">Dashboard</span></a>
    <a href="/users"><span class="icon">👥</span><span class="label">Kullanıcılar</span></a>
    <a href="/add-user" class="active"><span class="icon">➕</span><span class="label">Kullanıcı Ekle</span></a>
    <a href="/change"><span class="icon">🔑</span><span class="label">Şifre Değiştir</span></a>
    <a href="/setting"><span class="icon">⚙️</span><span class="label">Ayarlar</span></a>
    <a href="/activate-license"><span class="icon">💳</span><span class="label">Lisans</span></a>
    <a href="/landing"><span class="icon">🌐</span><span class="label">Landing</span></a>
    <a href="/logout"><span class="icon">🚪</span><span class="label">Çıkış</span></a>
</div>

<div id="content" class="content">
    <div class="card">
        <h2>Kullanıcı Ekle</h2>
        {% if message %}<div class="ok">{{ message }}</div>{% endif %}
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        <form method="POST" action="/add-user">
            <label>Kullanıcı Adı</label>
            <input type="text" name="username" required>

            <label>Şifre</label>
            <input type="password" name="password" required>

            <label>Rol</label>
            <select name="role">
                <option value="user">user</option>
                <option value="admin">admin</option>
            </select>

            <button type="submit">Kullanıcı Ekle</button>
        </form>
    </div>
</div>

<script>
const sidebar=document.getElementById("sidebar");
const content=document.getElementById("content");
const overlay=document.getElementById("overlay");
function isMobile(){return window.innerWidth<=768;}
function toggleSidebar(){
    if(isMobile()){sidebar.classList.toggle("expanded");overlay.classList.toggle("show");}
    else{sidebar.classList.toggle("expanded");content.classList.toggle("expanded");}
}
function closeSidebarMobile(){
    if(isMobile()){sidebar.classList.remove("expanded");overlay.classList.remove("show");}
}
window.addEventListener("resize",()=>{if(!isMobile())overlay.classList.remove("show");else content.classList.remove("expanded");});
</script>
</body>
</html>
