<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>EratGuard PRO • Signature Galaxy</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    .page{
      position:relative;
      width:100vw;
      height:100vh;
      height:100dvh;
      overflow:hidden;
      background:#000;
    }
    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      user-select:none;
      pointer-events:none;
    }
    .tap{
      position:absolute;
      display:block;
      border-radius:18px;
      text-decoration:none;
      background:rgba(0,255,120,0);
      z-index:3;
    }
    .tap:active{
      background:rgba(90,255,120,.16);
      box-shadow:0 0 24px rgba(90,255,120,.42);
    }

    /*
      IMAGE-MAP alanları:
      Yüzdeler 9:16 dikey ekran için ayarlandı.
      Görünmez tıklama bölgeleri final görseldeki dilimlerin üzerine oturur.
    */

    .istatistik{left:14%; top:21%; width:22%; height:14%;}
    .topluluk{left:39%; top:18%; width:22%; height:14%;}
    .analiz{left:64%; top:21%; width:22%; height:14%;}

    .koruma{left:0%; top:36%; width:28%; height:13%;}
    .engellenenler{left:72%; top:36%; width:28%; height:13%;}

    .lisans{left:3%; top:50%; width:27%; height:13%;}
    .bildirimler{left:72%; top:50%; width:28%; height:13%;}

    .raporlar{left:18%; top:63%; width:24%; height:13%;}
    .engellenen{left:40%; top:65%; width:22%; height:12%;}
    .ayarlar{left:61%; top:63%; width:24%; height:13%;}

    .pro{left:39%; top:39%; width:22%; height:14%; border-radius:999px;}

    .debug .tap{
      background:rgba(0,255,120,.08);
      outline:1px solid rgba(80,255,130,.45);
    }
  </style>
</head>
<body>
  <main class="page" aria-label="EratGuard Signature Galaxy PRO Radial">
    <img class="bg" src="/static/eratguard/signature_galaxy_pro_radial.png" alt="EratGuard Signature Galaxy PRO Radial">

    <a class="tap istatistik" href="/u/reports" aria-label="İstatistik"></a>
    <a class="tap topluluk" href="/u/community" aria-label="Topluluk"></a>
    <a class="tap analiz" href="/u/analysis" aria-label="Analiz"></a>

    <a class="tap koruma" href="/u/protection" aria-label="Koruma"></a>
    <a class="tap engellenenler" href="/u/blocked-sms" aria-label="Engellenenler"></a>

    <a class="tap lisans" href="/u/license" aria-label="Lisans"></a>
    <a class="tap bildirimler" href="/u/notifications" aria-label="Bildirimler"></a>

    <a class="tap raporlar" href="/u/reports" aria-label="Raporlar"></a>
    <a class="tap engellenen" href="/u/sms-actions-center" aria-label="Engellenen"></a>
    <a class="tap ayarlar" href="/u/settings" aria-label="Ayarlar"></a>

    <a class="tap pro" href="/u/pricing" aria-label="PRO"></a>
  </main>
</body>
</html>
