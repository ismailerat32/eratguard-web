<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EratGuard Signature Radial Panel</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#010604;color:#effff7;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body{
  background:
    radial-gradient(circle at 50% 22%,rgba(33,255,138,.20),transparent 28%),
    radial-gradient(circle at 50% 60%,rgba(94,234,255,.10),transparent 38%),
    linear-gradient(180deg,#020806,#000302);
}
.app{max-width:760px;margin:0 auto;padding:18px 10px 30px}
.hero{
  border:1px solid rgba(33,255,138,.50);
  border-radius:28px;
  background:rgba(2,12,9,.88);
  padding:28px 12px 24px;
  text-align:center;
  box-shadow:0 0 34px rgba(33,255,138,.18), inset 0 0 30px rgba(33,255,138,.06);
}
.brand{font-size:42px;font-weight:1000;color:#fff;text-shadow:0 0 18px rgba(33,255,138,.35)}
.brand span{color:#21ff8a}
.sub{margin-top:12px;color:#5eeaff;font-size:12px;font-weight:1000;letter-spacing:5px}
.pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:20px}
.pill{border:1px solid rgba(33,255,138,.55);border-radius:999px;padding:10px 14px;color:#7cffb2;background:rgba(33,255,138,.08);font-weight:1000;letter-spacing:2px}
.ringBox{position:relative;width:100%;margin:18px auto 12px}
svg{width:100%;height:auto;display:block;filter:drop-shadow(0 0 18px rgba(33,255,138,.28))}
.seg{fill:url(#segGrad);stroke:#21ff8a;stroke-width:1.7;vector-effect:non-scaling-stroke}
a:active .seg{fill:url(#segGradHot)}
.ray{stroke:rgba(124,255,178,.32);stroke-width:1;vector-effect:non-scaling-stroke}
.badge{fill:#020b07;stroke:#21ff8a;stroke-width:1.7;filter:drop-shadow(0 0 7px rgba(33,255,138,.75))}
.num{fill:#eafff4;font-size:15px;font-weight:1000;text-anchor:middle;dominant-baseline:middle}
.icon{font-size:28px;text-anchor:middle;dominant-baseline:middle}
.title{fill:#fff;font-size:14px;font-weight:1000;text-anchor:middle;dominant-baseline:middle;letter-spacing:.5px}
.hint{fill:#c9ffdf;font-size:8px;font-weight:900;text-anchor:middle;dominant-baseline:middle;opacity:.86}
.coreOuter{fill:rgba(33,255,138,.10);stroke:#21ff8a;stroke-width:4;filter:drop-shadow(0 0 18px rgba(33,255,138,.70))}
.coreInner{fill:url(#coreGrad)}
.coreE{fill:#fff;font-size:52px;font-weight:1000;text-anchor:middle;dominant-baseline:middle}
.coreText{fill:#fff;font-size:18px;font-weight:1000;text-anchor:middle;dominant-baseline:middle;letter-spacing:4px}
.coreSub{fill:#7cffb2;font-size:10px;font-weight:1000;text-anchor:middle;dominant-baseline:middle;letter-spacing:2px}
.status{margin-top:16px;border:1px solid rgba(33,255,138,.46);border-radius:999px;background:rgba(2,10,7,.88);padding:18px 12px;text-align:center;font-size:15px;font-weight:1000;letter-spacing:3px}
.dot{display:inline-block;width:24px;height:24px;border-radius:50%;background:#21ff8a;box-shadow:0 0 25px rgba(33,255,138,.95);vertical-align:-6px;margin-right:12px}
@media(max-width:430px){
  .app{padding:18px 6px 28px}
  .brand{font-size:40px}
  .sub{font-size:11px;letter-spacing:4px}
  .pill{font-size:12px}
  .ringBox{width:108vw;margin-left:calc(50% - 54vw)}
  .title{font-size:13px}
  .hint{font-size:7.4px}
  .icon{font-size:25px}
}
</style>
</head>
