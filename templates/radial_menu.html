<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020806">
  <title>EratGuard PRO</title>

  <style>
    :root{
      --bg:#020806;
      --green:#31f99e;
      --green2:#9cff5d;
      --green3:#12dc7a;
      --text:#f3fff8;
      --muted:rgba(230,255,240,.72);
      --line:rgba(49,249,158,.58);
      --glass:rgba(4,22,15,.68);
      --glass2:rgba(7,40,25,.42);
      --shadow:0 0 24px rgba(49,249,158,.38), 0 0 80px rgba(49,249,158,.12);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 52% 38%, rgba(49,249,158,.18), transparent 28%),
        radial-gradient(circle at 20% 18%, rgba(49,249,158,.13), transparent 23%),
        radial-gradient(circle at 85% 76%, rgba(156,255,93,.10), transparent 22%),
        linear-gradient(180deg,#010403,#03120d 50%,#010403);
      overflow:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.92) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(49,249,158,.65) 0 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,255,255,.22) 0 1px, transparent 1.5px);
      background-size: 72px 72px, 118px 118px, 43px 43px;
      background-position: 0 0, 30px 20px, 12px 8px;
      opacity:.42;
      pointer-events:none;
    }

    body:after{
      content:"";
      position:fixed;
      left:-10%;
      right:-10%;
      bottom:-26%;
      height:42%;
      background:
        radial-gradient(ellipse at center, rgba(49,249,158,.34) 0 1%, transparent 2%),
        radial-gradient(ellipse at center, rgba(49,249,158,.18), rgba(49,249,158,.05) 22%, transparent 58%);
      border-top:1px solid rgba(49,249,158,.34);
      filter:blur(.2px);
      opacity:.72;
      pointer-events:none;
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100dvh;
      padding:calc(env(safe-area-inset-top) + 28px) 18px calc(env(safe-area-inset-bottom) + 18px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
    }

    .topbar{
      width:min(840px,100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:4px 2px 6px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-icon{
      width:62px;
      height:62px;
      border-radius:19px;
      background:
        radial-gradient(circle at 30% 25%, rgba(156,255,93,.20), transparent 28%),
        linear-gradient(180deg, rgba(8,35,23,.95), rgba(0,0,0,.78));
      border:1px solid rgba(156,255,93,.62);
      box-shadow:0 0 22px rgba(49,249,158,.42), inset 0 0 24px rgba(49,249,158,.13);
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .brand-icon svg{width:42px;height:42px;filter:drop-shadow(0 0 8px rgba(49,249,158,.7))}
    .brand-title{line-height:1.02}
    .brand-title strong{
      display:block;
      font-size:clamp(26px,6vw,42px);
      letter-spacing:-.04em;
      white-space:nowrap;
      text-shadow:0 0 18px rgba(255,255,255,.14);
    }
    .brand-title strong span{color:#78ff44}
    .brand-title small{
      display:block;
      margin-top:6px;
      color:rgba(238,255,244,.68);
      font-size:clamp(13px,3.2vw,18px);
      white-space:nowrap;
    }

    .status-pill{
      display:flex;
      align-items:center;
      gap:8px;
      padding:12px 14px;
      border-radius:18px;
      color:#9cff5d;
      border:1px solid rgba(49,249,158,.34);
      background:linear-gradient(180deg, rgba(9,36,23,.72), rgba(4,18,12,.62));
      box-shadow:inset 0 0 24px rgba(49,249,158,.07), 0 0 20px rgba(49,249,158,.12);
      font-weight:850;
      font-size:14px;
      white-space:nowrap;
    }

    .status-pill i{
      width:9px;height:9px;border-radius:99px;background:#8cff45;
      box-shadow:0 0 12px #8cff45;
    }

    .wheel-wrap{
      position:relative;
      width:min(94vw,700px);
      aspect-ratio:1/1;
      margin-top:8px;
      display:grid;
      place-items:center;
    }

    .orbit{
      position:absolute;
      inset:1.8%;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.20);
      box-shadow:0 0 40px rgba(49,249,158,.08), inset 0 0 60px rgba(49,249,158,.06);
    }

    .orbit:before,
    .orbit:after{
      content:"";
      position:absolute;
      inset:5.5%;
      border-radius:50%;
      border:1px dashed rgba(156,255,93,.18);
    }

    .orbit:after{
      inset:11%;
      border-style:solid;
      border-color:rgba(49,249,158,.12);
    }

    .slices{
      position:absolute;
      inset:0;
      border-radius:50%;
      filter:drop-shadow(0 0 12px rgba(49,249,158,.18));
    }

    .slice{
      position:absolute;
      left:50%;
      top:50%;
      width:30.5%;
      height:30%;
      translate:-50% -50%;
      transform:rotate(var(--a)) translateY(-118%) rotate(calc(-1 * var(--a)));
      text-decoration:none;
      color:var(--text);
      outline:none;
    }

    .slice-card{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:9px;
      padding:16px 10px 13px;
      clip-path:polygon(12% 8%, 88% 8%, 100% 31%, 82% 100%, 18% 100%, 0% 31%);
      background:
        radial-gradient(circle at 50% 20%, rgba(156,255,93,.14), transparent 36%),
        linear-gradient(180deg, rgba(19,64,42,.62), rgba(1,12,8,.72));
      border:1px solid rgba(177,255,130,.76);
      box-shadow:
        inset 0 0 22px rgba(49,249,158,.18),
        inset 0 0 2px rgba(255,255,255,.34),
        0 0 18px rgba(49,249,158,.28);
      transition:transform .18s ease, filter .18s ease, background .18s ease;
      position:relative;
    }

    .slice-card:before{
      content:"";
      position:absolute;
      inset:4px;
      clip-path:inherit;
      border:1px solid rgba(49,249,158,.28);
      opacity:.82;
    }

    .slice:active .slice-card,
    .slice:hover .slice-card{
      transform:scale(1.035);
      filter:brightness(1.22);
      background:
        radial-gradient(circle at 50% 24%, rgba(156,255,93,.24), transparent 38%),
        linear-gradient(180deg, rgba(29,86,55,.76), rgba(3,20,13,.78));
    }

    .ico{
      font-size:clamp(28px,8.4vw,56px);
      line-height:1;
      color:#95ff60;
      text-shadow:0 0 15px rgba(156,255,93,.75), 0 0 28px rgba(49,249,158,.34);
      filter:saturate(1.15);
    }

    .label{
      font-size:clamp(13px,3.2vw,22px);
      font-weight:760;
      letter-spacing:-.025em;
      text-align:center;
      text-shadow:0 2px 12px rgba(0,0,0,.7);
      line-height:1.05;
    }

    .under{
      width:34px;
      height:2px;
      border-radius:99px;
      background:#a6ff58;
      box-shadow:0 0 10px #70ff4a;
    }

    .hub{
      position:absolute;
      width:29%;
      aspect-ratio:1/1;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle, rgba(125,255,76,.32), rgba(4,40,22,.74) 54%, rgba(1,8,5,.92) 72%);
      border:2px solid rgba(173,255,111,.86);
      box-shadow:
        0 0 26px rgba(126,255,71,.72),
        0 0 90px rgba(49,249,158,.26),
        inset 0 0 35px rgba(49,249,158,.28);
      z-index:3;
    }

    .hub:before{
      content:"";
      position:absolute;
      inset:-16%;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.35);
      box-shadow:inset 0 0 18px rgba(49,249,158,.16);
      background:repeating-conic-gradient(from 0deg, rgba(49,249,158,.32) 0 1deg, transparent 1deg 7deg);
      mask:radial-gradient(circle, transparent 56%, black 57%);
    }

    .hub:after{
      content:"";
      position:absolute;
      inset:-31%;
      border-radius:50%;
      border:1px solid rgba(49,249,158,.20);
      box-shadow:inset 0 0 42px rgba(49,249,158,.08);
    }

    .hub strong{
      position:relative;
      z-index:2;
      font-size:clamp(34px,10vw,76px);
      line-height:1;
      font-weight:950;
      letter-spacing:-.06em;
      color:#f4fff7;
      text-shadow:0 0 18px rgba(156,255,93,.78), 0 3px 0 rgba(0,0,0,.25);
    }

    .scan-line{
      position:absolute;
      width:1px;
      height:92%;
      background:linear-gradient(180deg, transparent, rgba(156,255,93,.50), transparent);
      transform-origin:center;
      opacity:.55;
    }

    .scan-line.l1{transform:rotate(0deg)}
    .scan-line.l2{transform:rotate(45deg)}
    .scan-line.l3{transform:rotate(90deg)}
    .scan-line.l4{transform:rotate(135deg)}

    .safe-card{
      width:min(840px,100%);
      margin-top:auto;
      border-radius:20px;
      padding:16px;
      background:linear-gradient(180deg, rgba(5,28,18,.68), rgba(2,12,8,.68));
      border:1px solid rgba(49,249,158,.28);
      box-shadow:0 0 30px rgba(49,249,158,.10), inset 0 0 28px rgba(49,249,158,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .safe-left{
      display:flex;
      align-items:center;
      gap:13px;
      min-width:0;
    }

    .safe-shield{
      width:54px;height:54px;border-radius:18px;
      display:grid;place-items:center;
      color:#9cff5d;
      font-size:31px;
      background:rgba(49,249,158,.08);
      border:1px solid rgba(49,249,158,.30);
      box-shadow:0 0 20px rgba(49,249,158,.18);
      flex:0 0 auto;
    }

    .safe-title{
      font-size:clamp(17px,4.5vw,25px);
      font-weight:850;
      letter-spacing:-.035em;
    }

    .safe-sub{
      margin-top:3px;
      color:#76ff42;
      font-size:clamp(13px,3.4vw,17px);
      font-weight:700;
    }

    .pulse{
      width:54px;height:54px;border-radius:50%;
      border:1px solid rgba(49,249,158,.28);
      display:grid;place-items:center;
      color:#8cff45;
      box-shadow:inset 0 0 20px rgba(49,249,158,.10);
      flex:0 0 auto;
      font-size:26px;
    }

    .features{
      width:min(840px,100%);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:0 4px;
    }

    .feat{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      color:rgba(243,255,248,.76);
      font-size:clamp(10px,2.7vw,13px);
      line-height:1.18;
      text-align:left;
    }

    .feat b{
      width:28px;height:28px;border-radius:10px;
      display:grid;place-items:center;
      color:#9cff5d;
      border:1px solid rgba(49,249,158,.22);
      background:rgba(49,249,158,.06);
      flex:0 0 auto;
      font-size:16px;
    }

    @media (max-width:460px){
      .page{padding-left:12px;padding-right:12px;gap:14px}
      .topbar{align-items:flex-start}
      .brand-icon{width:54px;height:54px;border-radius:16px}
      .brand-icon svg{width:37px;height:37px}
      .status-pill{display:none}
      .wheel-wrap{width:min(108vw,620px); margin-left:-4vw; margin-right:-4vw;}
      .slice{width:31.8%;height:31.2%;transform:rotate(var(--a)) translateY(-116%) rotate(calc(-1 * var(--a)))}
      .slice-card{gap:7px;padding:12px 7px 10px}
      .safe-card{padding:13px 14px;border-radius:18px}
      .pulse{display:none}
      .features{gap:4px}
      .feat{flex-direction:column;text-align:center;gap:5px}
    }

    @media (max-height:760px){
      .page{padding-top:18px;gap:10px}
      .brand-icon{width:50px;height:50px}
      .wheel-wrap{width:min(92vw,560px)}
      .safe-card{padding:12px 14px}
      .features{display:none}
    }

    .slice .ico{
      width:clamp(34px,9vw,60px);
      height:clamp(34px,9vw,60px);
      fill:none;
      stroke:#9cff5d;
      stroke-width:3.2;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 8px rgba(156,255,93,.95)) drop-shadow(0 0 18px rgba(49,249,158,.45));
    }

    .slice-card{
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .slice-card:hover .ico,
    .slice:active .ico{
      stroke:#d7ff9a;
      filter:drop-shadow(0 0 10px rgba(215,255,154,1)) drop-shadow(0 0 24px rgba(49,249,158,.65));
    }

  </style>
</head>

<body>

<svg width="0" height="0" style="position:absolute;visibility:hidden" aria-hidden="true">
  <symbol id="i-shield" viewBox="0 0 64 64">
    <path d="M32 6 52 14v15c0 14-8 24-20 29C20 53 12 43 12 29V14L32 6Z"/>
    <path d="m23 32 6 6 13-15"/>
  </symbol>
  <symbol id="i-search" viewBox="0 0 64 64">
    <circle cx="28" cy="28" r="17"/>
    <path d="m40 40 14 14"/>
    <path d="M18 31h7l4-8 5 13 4-6h6"/>
  </symbol>
  <symbol id="i-block" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="22"/>
    <path d="M17 47 47 17"/>
    <path d="M24 38c2-4 5-6 8-6s6 2 8 6"/>
    <circle cx="32" cy="24" r="6"/>
  </symbol>
  <symbol id="i-bell" viewBox="0 0 64 64">
    <path d="M19 45h26l-4-7V27c0-7-4-12-9-12s-9 5-9 12v11l-4 7Z"/>
    <path d="M28 50c1 4 7 4 8 0"/>
    <circle cx="47" cy="17" r="7"/>
    <path d="M47 14v6"/>
  </symbol>
  <symbol id="i-report" viewBox="0 0 64 64">
    <rect x="18" y="12" width="28" height="42" rx="4"/>
    <path d="M25 23h14M25 32h14M25 41h8"/>
    <path d="m39 46 4 4 8-10"/>
  </symbol>
  <symbol id="i-users" viewBox="0 0 64 64">
    <circle cx="32" cy="24" r="8"/>
    <path d="M18 51c2-10 8-15 14-15s12 5 14 15"/>
    <circle cx="17" cy="29" r="6"/>
    <circle cx="47" cy="29" r="6"/>
    <path d="M7 51c1-7 5-11 10-12M57 51c-1-7-5-11-10-12"/>
  </symbol>
  <symbol id="i-license" viewBox="0 0 64 64">
    <path d="M16 12h28l8 8v32H16V12Z"/>
    <path d="M44 12v9h8"/>
    <path d="M23 27h20M23 36h14"/>
    <circle cx="42" cy="45" r="6"/>
    <path d="m38 51-3 7 7-3 7 3-3-7"/>
  </symbol>
  <symbol id="i-settings" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="8"/>
    <path d="M32 8v8M32 48v8M8 32h8M48 32h8M15 15l6 6M43 43l6 6M49 15l-6 6M21 43l-6 6"/>
    <path d="M32 18a14 14 0 1 0 0 28 14 14 0 0 0 0-28Z"/>
  </symbol>
</svg>

  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none">
            <path d="M32 6 52 14v16c0 13.5-8.4 23-20 28C20.4 53 12 43.5 12 30V14L32 6Z" stroke="#8cff45" stroke-width="3.2"/>
            <path d="M22 26h20v13H29l-7 6V26Z" stroke="#31f99e" stroke-width="3" stroke-linejoin="round"/>
            <path d="M25 32h2M31 32h2M37 32h2" stroke="#9cff5d" stroke-width="3" stroke-linecap="round"/>
            <circle cx="47" cy="47" r="10" fill="#06140d" stroke="#8cff45" stroke-width="3"/>
            <path d="m42 47 3 3 7-8" stroke="#9cff5d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-title">
          <strong>EratGuard <span>PRO</span></strong>
          <small>Akıllı koruma, tam kontrol</small>
        </div>
      </div>

      <div class="status-pill">
        <span>🛡️ Korunuyorsunuz</span><i></i>
      </div>
    </header>

    <section class="wheel-wrap" aria-label="EratGuard PRO radial menü">
      <div class="orbit"></div>
      <div class="scan-line l1"></div>
      <div class="scan-line l2"></div>
      <div class="scan-line l3"></div>
      <div class="scan-line l4"></div>

      
      <svg class="real-slice-wheel" viewBox="0 0 1000 1000" aria-hidden="true">
        <defs>
          <filter id="sliceGlow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <radialGradient id="sliceFill" cx="50%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#38ff9b" stop-opacity=".18"/>
            <stop offset="48%" stop-color="#0c3b25" stop-opacity=".34"/>
            <stop offset="100%" stop-color="#020806" stop-opacity=".78"/>
          </radialGradient>

          <linearGradient id="sliceStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#dcffab" stop-opacity=".95"/>
            <stop offset="45%" stop-color="#8cff45" stop-opacity=".95"/>
            <stop offset="100%" stop-color="#31f99e" stop-opacity=".78"/>
          </linearGradient>
        </defs>

        <g filter="url(#sliceGlow)">
          <path class="real-slice" d="M 386.70 124.73 A 392.00 392.00 0 0 1 613.30 124.73 L 551.45 329.60 A 178.00 178.00 0 0 0 448.55 329.60 Z"/>
          <path class="real-slice" d="M 685.24 154.53 A 392.00 392.00 0 0 1 845.47 314.76 L 656.87 415.89 A 178.00 178.00 0 0 0 584.11 343.13 Z"/>
          <path class="real-slice" d="M 875.27 386.70 A 392.00 392.00 0 0 1 875.27 613.30 L 670.40 551.45 A 178.00 178.00 0 0 0 670.40 448.55 Z"/>
          <path class="real-slice" d="M 845.47 685.24 A 392.00 392.00 0 0 1 685.24 845.47 L 584.11 656.87 A 178.00 178.00 0 0 0 656.87 584.11 Z"/>
          <path class="real-slice" d="M 613.30 875.27 A 392.00 392.00 0 0 1 386.70 875.27 L 448.55 670.40 A 178.00 178.00 0 0 0 551.45 670.40 Z"/>
          <path class="real-slice" d="M 314.76 845.47 A 392.00 392.00 0 0 1 154.53 685.24 L 343.13 584.11 A 178.00 178.00 0 0 0 415.89 656.87 Z"/>
          <path class="real-slice" d="M 124.73 613.30 A 392.00 392.00 0 0 1 124.73 386.70 L 329.60 448.55 A 178.00 178.00 0 0 0 329.60 551.45 Z"/>
          <path class="real-slice" d="M 154.53 314.76 A 392.00 392.00 0 0 1 314.76 154.53 L 415.89 343.13 A 178.00 178.00 0 0 0 343.13 415.89 Z"/>
        </g>

        <circle cx="500" cy="500" r="407" class="real-ring"/>
        <circle cx="500" cy="500" r="246" class="real-inner-ring"/>
      </svg>


      <nav class="slices">
        <a class="slice" style="--a:0deg" href="/protection" aria-label="Koruma">
          <span class="slice-card"><svg class="ico"><use href="#i-shield"/></svg><span class="label">Koruma</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:45deg" href="/analysis" aria-label="Analiz">
          <span class="slice-card"><svg class="ico"><use href="#i-search"/></svg><span class="label">Analiz</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:90deg" href="/blocked" aria-label="Engellenenler">
          <span class="slice-card"><svg class="ico"><use href="#i-block"/></svg><span class="label">Engellenenler</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:135deg" href="/alerts" aria-label="Bildirimler">
          <span class="slice-card"><svg class="ico"><use href="#i-bell"/></svg><span class="label">Bildirimler</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:180deg" href="/reports" aria-label="Raporlar">
          <span class="slice-card"><svg class="ico"><use href="#i-report"/></svg><span class="label">Raporlar</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:225deg" href="/community" aria-label="Topluluk">
          <span class="slice-card"><svg class="ico"><use href="#i-users"/></svg><span class="label">Topluluk</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:270deg" href="/u/license" aria-label="Lisans">
          <span class="slice-card"><svg class="ico"><use href="#i-license"/></svg><span class="label">Lisans</span><span class="under"></span></span>
        </a>

        <a class="slice" style="--a:315deg" href="/settings" aria-label="Ayarlar">
          <span class="slice-card"><svg class="ico"><use href="#i-settings"/></svg><span class="label">Ayarlar</span><span class="under"></span></span>
        </a>
      </nav>

      <div class="hub" aria-hidden="true"><strong>PRO</strong></div>
    </section>

    <section class="safe-card">
      <div class="safe-left">
        <div class="safe-shield">✓</div>
        <div>
          <div class="safe-title">Sisteminiz güvende</div>
          <div class="safe-sub">Tüm koruma modülleri aktif</div>
        </div>
      </div>
