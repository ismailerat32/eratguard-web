<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>EratGuard PRO • Signature Galaxy</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    .page{
      position:relative;
      width:100vw;
      height:100vh;
      height:100dvh;
      overflow:hidden;
      background:#000;
    }
    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center 36%;
      transform:scale(1.03);
      transform-origin:center center;
      user-select:none;
      pointer-events:none;
    }

    .page:before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:10%;
      z-index:2;
      pointer-events:none;
      background:
        linear-gradient(180deg,rgba(0,0,0,1),rgba(0,0,0,.90) 55%,rgba(0,0,0,0));
    }
    .page:after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:28%;
      z-index:2;
      pointer-events:none;
      background:
        linear-gradient(0deg,rgba(0,0,0,1),rgba(0,0,0,1) 58%,rgba(0,0,0,0));
    }


    .tap-debug .tap{
      outline:2px solid rgba(255,255,255,.85);
      background:rgba(0,255,120,.16);
      border-radius:12px;
      z-index:5;
    }
    .tap-debug .tap:after{
      content:attr(data-label);
      position:absolute;
      left:6px;
      top:6px;
      padding:3px 6px;
      border-radius:999px;
      background:rgba(0,0,0,.72);
      color:#fff;
      font:700 11px Arial,sans-serif;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .tap{
      position:absolute;
      display:block;
      border-radius:18px;
      text-decoration:none;
      background:rgba(0,255,120,0);
      z-index:3;
    }
    .tap:active{
      background:rgba(90,255,120,.16);
      box-shadow:0 0 24px rgba(90,255,120,.42);
    }

    /*
      IMAGE-MAP alanları:
      Yüzdeler 9:16 dikey ekran için ayarlandı.
      Görünmez tıklama bölgeleri final görseldeki dilimlerin üzerine oturur.
    */

    .istatistik{left:12%; top:26%; width:25%; height:10%;}
    .topluluk{left:34%; top:23%; width:32%; height:10%;}
    .analiz{left:62%; top:26%; width:27%; height:10%;}

    .koruma{left:0%;  top:37%; width:27%; height:10%;}
    .engellenenler{left:72%; top:37%; width:28%; height:10%;}

    .lisans{left:0%;  top:49%; width:27%; height:10%;}
    .bildirimler{left:72%; top:49%; width:28%; height:10%;}

    .raporlar{left:10%; top:60%; width:26%; height:11%;}
    .engellenen{left:35%; top:62%; width:30%; height:11%;}
    .ayarlar{left:63%; top:60%; width:27%; height:11%;}

    .pro{left:36%; top:40%; width:28%; height:15%;}

    .debug .tap{
      background:rgba(0,255,120,.08);
      outline:1px solid rgba(80,255,130,.45);
    }
  </style>
</head>
<body>
  <main class="page" aria-label="EratGuard Signature Galaxy PRO Radial">
    <img class="bg" src="/static/eratguard/signature_galaxy_pro_radial.png?v=12" alt="EratGuard Signature Galaxy PRO Radial">

    <a class="tap istatistik" href="/u/reports" aria-label="İstatistik" data-label="İstatistik"></a>
    <a class="tap topluluk" href="/u/community" aria-label="Topluluk" data-label="Topluluk"></a>
    <a class="tap analiz" href="/u/analysis" aria-label="Analiz" data-label="Analiz"></a>

    <a class="tap koruma" href="/u/protection" aria-label="Koruma" data-label="Koruma"></a>
    <a class="tap engellenenler" href="/u/blocked-sms" aria-label="Engellenenler" data-label="Engellenenler"></a>

    <a class="tap lisans" href="/u/license" aria-label="Lisans" data-label="Lisans"></a>
    <a class="tap bildirimler" href="/u/notifications" aria-label="Bildirimler" data-label="Bildirimler"></a>

    <a class="tap raporlar" href="/u/reports" aria-label="Raporlar" data-label="Raporlar"></a>
    <a class="tap engellenen" href="/u/sms-actions-center" aria-label="Engellenen" data-label="Engellenen"></a>
    <a class="tap ayarlar" href="/u/settings" aria-label="Ayarlar" data-label="Ayarlar"></a>

    <a class="tap pro" href="/u/pricing" aria-label="PRO" data-label="PRO"></a>
  </main>

  <script>
    (function(){
      try{
        var q = new URLSearchParams(window.location.search);
        if(q.has("tapdebug")){
          document.documentElement.classList.add("tap-debug");
          document.body.classList.add("tap-debug");
        }
      }catch(e){}
    })();
  </script>

</body>
</html>
