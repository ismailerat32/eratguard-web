<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EratGuard DOME LAB</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  background:#020705;
  color:#ecfff6;
  font-family:Arial,Helvetica,sans-serif;
  overflow-x:hidden;
}
body{
  background:
    radial-gradient(circle at 50% 18%, rgba(35,255,143,.22), transparent 30%),
    radial-gradient(circle at 50% 56%, rgba(75,220,255,.12), transparent 38%),
    linear-gradient(180deg,#020806 0%,#000302 100%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(60deg, rgba(124,255,178,.055) 1px, transparent 1px),
    linear-gradient(120deg, rgba(94,234,255,.04) 1px, transparent 1px);
  background-size:34px 58px;
  opacity:.28;
}
.app{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:28px 10px 34px;
}
.hero{
  border:1px solid rgba(33,255,138,.48);
  border-radius:30px;
  background:
    radial-gradient(circle at 50% 115%, rgba(33,255,138,.16), transparent 42%),
    rgba(2,13,9,.88);
  padding:24px 12px 22px;
  text-align:center;
  box-shadow:0 0 36px rgba(33,255,138,.16), inset 0 0 34px rgba(33,255,138,.06);
}
.brand{
  font-size:38px;
  line-height:1;
  font-weight:1000;
  color:#fff;
  text-shadow:0 0 16px rgba(33,255,138,.38);
}
.brand span{color:#21ff8a}
.sub{
  margin-top:12px;
  color:#5eeaff;
  font-size:11px;
  font-weight:1000;
  letter-spacing:4.8px;
}
.pills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}
.pill{
  border:1px solid rgba(33,255,138,.55);
  border-radius:999px;
  color:#9dffc8;
  background:rgba(33,255,138,.08);
  padding:9px 13px;
  font-size:11px;
  font-weight:1000;
  letter-spacing:2.3px;
}
.ring-wrap{
  width:100%;
  margin:20px auto 18px;
  position:relative;
}
svg{
  width:100%;
  height:auto;
  display:block;
  overflow:visible;
  filter:drop-shadow(0 0 18px rgba(33,255,138,.30));
}
.outer-ring{
  fill:none;
  stroke:rgba(124,255,178,.22);
  stroke-width:1.2;
}
.dot-ring{
  fill:none;
  stroke:rgba(230,255,245,.40);
  stroke-width:6;
  stroke-dasharray:2 12;
  opacity:.45;
}
.micro-ring{
  fill:none;
  stroke:rgba(94,234,255,.18);
  stroke-width:1;
}
.segment{
  fill:url(#segGrad);
  stroke:#21ff8a;
  stroke-width:1.8;
  vector-effect:non-scaling-stroke;
}
.seg-link:active .segment{
  fill:url(#segGradHot);
}
.ray{
  stroke:rgba(124,255,178,.34);
  stroke-width:1;
  vector-effect:non-scaling-stroke;
}
.seg-badge{
  fill:#020b07;
  stroke:#21ff8a;
  stroke-width:1.6;
  filter:drop-shadow(0 0 8px rgba(33,255,138,.85));
}
.seg-no{
  fill:#eafff4;
  font-size:14px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
}
.seg-icon{
  fill:#dffff2;
  font-size:25px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
}
.seg-title{
  fill:#fff;
  font-size:12.3px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
  letter-spacing:.45px;
}
.seg-hint{
  fill:#caffdf;
  font-size:7.2px;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
  opacity:.86;
}
.core-shadow{
  fill:rgba(33,255,138,.10);
  stroke:#21ff8a;
  stroke-width:4;
  filter:drop-shadow(0 0 24px rgba(33,255,138,.78));
}
.core{
  fill:url(#coreGrad);
}
.core-e{
  fill:#fff;
  font-size:50px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
}
.core-title{
  fill:#fff;
  font-size:17px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
  letter-spacing:4px;
}
.core-sub{
  fill:#7cffb2;
  font-size:9.5px;
  font-weight:1000;
  text-anchor:middle;
  dominant-baseline:middle;
  letter-spacing:1.8px;
}
.status{
  margin-top:16px;
  border:1px solid rgba(33,255,138,.46);
  border-radius:999px;
  background:rgba(2,10,7,.88);
  box-shadow:0 0 26px rgba(33,255,138,.12), inset 0 0 20px rgba(33,255,138,.045);
  padding:17px 12px;
  text-align:center;
  font-size:14px;
  font-weight:1000;
  letter-spacing:2.7px;
}
.dot{
  display:inline-block;
  width:23px;
  height:23px;
  border-radius:50%;
  background:#21ff8a;
  box-shadow:0 0 24px rgba(33,255,138,.95);
  vertical-align:-6px;
  margin-right:11px;
}
@media(max-width:430px){
  .app{padding-top:22px}
  .hero{padding:22px 10px 20px}
  .brand{font-size:36px}
  .sub{font-size:10px;letter-spacing:4.2px}
  .ring-wrap{width:100%;margin-top:18px}
  .seg-title{font-size:11.8px}
  .seg-hint{font-size:6.8px}
  .seg-icon{font-size:23px}
  .status{font-size:13px;letter-spacing:2.1px}
}
</style>

<style id="eratguard-radial-v13-spiral-css">
/* ERATGUARD USER RADIAL V13 SPIRAL DEPLOY */
.eg-v13-spiral-overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:80;
  overflow:hidden;
}
.eg-v13-spiral-ring{
  position:absolute;
  left:50%;
  top:45%;

  height:280px;
  margin-left:-140px;
  margin-top:-140px;
  border-radius:50%;
  border:1px solid rgba(0,255,130,.28);
  box-shadow:
    0 0 30px rgba(0,255,130,.25),
    inset 0 0 28px rgba(0,255,130,.09);
  opacity:0;
  transform:scale(.25) rotate(0deg);
}
.eg-v13-spiral-ring.r2{
  width:430px;
  height:430px;
  margin-left:-215px;
  margin-top:-215px;
  border-color:rgba(0,240,255,.20);
}
.eg-v13-spiral-ring.r3{
  width:590px;
  height:590px;
  margin-left:-295px;
  margin-top:-295px;
  border-color:rgba(0,255,130,.14);
}
.eg-v13-spiral-sweep{
  position:absolute;
  left:50%;
  top:45%;
  width:420px;
  height:420px;
  margin-left:-210px;
  margin-top:-210px;
  border-radius:50%;
  background:
    conic-gradient(from 0deg,
      transparent 0deg,
      rgba(0,255,130,.00) 34deg,
      rgba(0,255,130,.44) 60deg,
      rgba(0,240,255,.28) 78deg,
      transparent 102deg,
      transparent 360deg);
  filter:blur(.2px) drop-shadow(0 0 18px rgba(0,255,130,.72));
  opacity:0;
  transform:scale(.2) rotate(-140deg);
}
.eg-v13-sound-toggle{
  position:fixed;
  right:14px;
  top:calc(env(safe-area-inset-top,0px) + 14px);
  z-index:120;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid rgba(0,255,130,.42);
  background:rgba(0,20,10,.72);
  color:#7cffb2;
  font-size:17px;
  font-weight:900;
  box-shadow:0 0 18px rgba(0,255,130,.22), inset 0 0 18px rgba(0,255,130,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(8px);
}
.eg-v13-sound-toggle.off{
  color:rgba(210,255,230,.42);
  border-color:rgba(210,255,230,.18);
  box-shadow:inset 0 0 18px rgba(255,255,255,.04);
}
.eg-v13-ready-flash{
  position:fixed;
  left:50%;
  bottom:74px;
  transform:translateX(-50%);
  z-index:95;
  pointer-events:none;
  color:#dfffee;
  border:1px solid rgba(0,255,130,.38);
  border-radius:999px;
  background:rgba(0,18,9,.70);
  padding:10px 18px;
  font-size:11px;
  font-weight:900;
  letter-spacing:.22em;
  text-shadow:0 0 12px rgba(0,255,130,.78);
  box-shadow:0 0 22px rgba(0,255,130,.20), inset 0 0 22px rgba(0,255,130,.08);
  opacity:0;
}
.eg-v13-spawned{
  will-change:transform,opacity,filter;
}
.eg-v13-core-pulse{
  animation:egV13CorePulse 1.2s ease-in-out 0s 2;
}
@keyframes egV13CorePulse{
  0%{filter:drop-shadow(0 0 0 rgba(0,255,130,0));}
  45%{filter:drop-shadow(0 0 24px rgba(0,255,130,.90)) drop-shadow(0 0 46px rgba(0,240,255,.42));}
  100%{filter:drop-shadow(0 0 8px rgba(0,255,130,.30));}
}
@media(max-width:760px){

    font-size:9px;
    padding:9px 14px;
  }
}
</style>


<style id="eratguard-radial-v14-spiral-polish-css">
/* ERATGUARD USER RADIAL V14 SPIRAL POLISH */

/* Hide 01-12 visual number badges on the radial slices */
.seg-link .num,
.seg-link .number,
.seg-link .idx,
.seg-link .badge,
.seg-link .seg-no,
.seg-link .seg-num,
.segment-number,
.slice-number,
.radial-number,
[data-index],
[data-no]{
  display:none!important;
}

/* Fallback: hide small absolute circular number badges commonly used around slices */
.seg-link > span:first-child,
.seg-link > b:first-child{
  /* JS will decide text-based hiding too; this keeps layout clean if first child is the number badge */
}

/* Make the deploy feel more like reference #2: spiral energy flow */
.eg-v13-spiral-overlay{
  mix-blend-mode:screen;
}
.eg-v13-spiral-sweep{
  width:520px!important;
  height:520px!important;
  margin-left:-260px!important;
  margin-top:-260px!important;
  background:
    conic-gradient(from 0deg,
      transparent 0deg,
      rgba(0,255,130,.00) 22deg,
      rgba(0,255,130,.18) 44deg,
      rgba(0,255,130,.68) 66deg,
      rgba(0,240,255,.42) 92deg,
      rgba(0,255,130,.16) 122deg,
      transparent 152deg,
      transparent 360deg)!important;
  filter:blur(.4px) drop-shadow(0 0 22px rgba(0,255,130,.9)) drop-shadow(0 0 42px rgba(0,240,255,.35))!important;
}
.eg-v13-spiral-ring{
  border-style:dashed!important;
  animation:egV14SlowRotate 5.5s linear infinite;
}
.eg-v13-spawned{
  transform-origin:center center!important;
}
.seg-link.eg-v13-spawned{
  filter:drop-shadow(0 0 18px rgba(0,255,130,.48));
}
@keyframes egV14SlowRotate{
  to{transform:rotate(360deg)}
}
@media(max-width:760px){
  .eg-v13-spiral-sweep{
    width:430px!important;
    height:430px!important;
    margin-left:-215px!important;
    margin-top:-215px!important;
  }
}
</style>


<style id="eratguard-radial-v15-center-clone-css">
/* ERATGUARD USER RADIAL V15 CENTER CLONE DEPLOY */

/* Hide old black number dots/badges completely */
.seg-link .num,
.seg-link .number,
.seg-link .idx,
.seg-link .badge,
.seg-link .seg-no,
.seg-link .seg-num,
.segment-number,
.slice-number,
.radial-number,
.seg-link [class*="num"],
.seg-link [class*="badge"],
.seg-link [class*="index"]{
  display:none!important;
  opacity:0!important;
  visibility:hidden!important;
}

/* During deploy original slices are hidden; clones do the animation */
.eg-v15-deploying .seg-link{
  opacity:0!important;
}

.eg-v15-clone-layer{
  position:fixed;
  inset:0;
  z-index:110;
  pointer-events:none;
  overflow:hidden;
  mix-blend-mode:screen;
}

.eg-v15-clone{
  position:fixed;
  margin:0!important;
  transform-origin:center center!important;
  pointer-events:none!important;
  will-change:left,top,transform,opacity,filter;
  filter:
    drop-shadow(0 0 16px rgba(0,255,130,.70))
    drop-shadow(0 0 30px rgba(0,240,255,.28));
}

.eg-v15-clone *{
  pointer-events:none!important;
}

.eg-v15-energy{

  box-shadow:
    0 0 32px rgba(0,255,130,.85),
    0 0 70px rgba(0,240,255,.32);
  opacity:0;
}

.eg-v15-spiral-path{

  border-radius:50%;
  z-index:107;
  pointer-events:none;
  background:
    conic-gradient(from -90deg,
      transparent 0deg,
      rgba(0,255,130,.02) 24deg,
      rgba(0,255,130,.36) 54deg,
      rgba(0,240,255,.24) 80deg,
      transparent 115deg,
      transparent 360deg);
  filter:drop-shadow(0 0 22px rgba(0,255,130,.72));
  opacity:0;
}

.eg-v15-ready{
  position:fixed;
  left:50%;
  bottom:72px;

  color:#eafff4;
  border:1px solid rgba(0,255,130,.45);

  background:rgba(0,18,9,.78);
  padding:10px 18px;
  font-size:11px;
  font-weight:900;

  box-shadow:0 0 24px rgba(0,255,130,.22), inset 0 0 20px rgba(0,255,130,.08);
  opacity:0;
  pointer-events:none;
}

.eg-v13-sound-toggle{
  z-index:130!important;
}

@media(max-width:760px){

    top:43%;

    top:43%;
  }

    padding:9px 14px;
  }
}
</style>

<script id="eratguard-12p-link-bridge">
(function(){
  if(window.__ERATGUARD_12P_LINK_BRIDGE__) return;
  window.__ERATGUARD_12P_LINK_BRIDGE__ = true;

  var routes = [
    {keys:["SMS VARSAYILAN","VARSAYILAN SMS","SMS"], url:"/u/sms-default"},
    {keys:["PRO KORUMA","PRO"], url:"/u/protection"},
    {keys:["AI ANALIZ","AI ANALİZ","AI"], url:"/u/ai"},
    {keys:["RAPORLAR","RAPOR"], url:"/u/reports"},
    {keys:["ENGELLENENLER","ENGELLENEN"], url:"/u/blocked-sms"},
    {keys:["BILDIRIMLER","BİLDİRİMLER","BILDIRIM","BİLDİRİM"], url:"/u/notifications"},
    {keys:["LISANS","LİSANS"], url:"/u/license"},
    {keys:["AYARLAR","AYAR"], url:"/u/settings"},
    {keys:["TOPLULUK"], url:"/u/community"},
    {keys:["TARAMA","SCAN"], url:"/u/scan"},
    {keys:["GUVENLIK SKORU","GÜVENLİK SKORU","GUVENLIK","GÜVENLİK"], url:"/u/security-score"},
    {keys:["DESTEK YARDIM","DESTEK","YARDIM"], url:"/u/support"}
  ];

  function norm(x){
    return (x || "")
      .toUpperCase()
      .replace(/\s+/g," ")
      .replace(/[^\wÇĞİÖŞÜçğıöşü ]/g,"")
      .trim();
  }

  function findUrl(text){
    var t = norm(text);
    for(var i=0;i<routes.length;i++){
      for(var j=0;j<routes[i].keys.length;j++){
        if(t.indexOf(norm(routes[i].keys[j])) !== -1){
          return routes[i].url;
        }
      }
    }
    return null;
  }

  function attach(){
    var candidates = [].slice.call(document.querySelectorAll("a,button,[onclick],.slice,.sector,.item,.menu-item,.radial-item,g,path,text,div"));
    candidates.forEach(function(el){
      if(el.__eratguard12p) return;
      var txt = norm(el.innerText || el.textContent || el.getAttribute("aria-label") || el.getAttribute("title") || "");
      var url = findUrl(txt);
      if(!url) return;

      el.__eratguard12p = true;
      el.setAttribute("data-eg-url", url);
      el.style.cursor = "pointer";

      if(el.tagName && el.tagName.toLowerCase() === "a"){
        el.setAttribute("href", url);
      }

      el.addEventListener("click", function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        window.location.href = url;
      }, true);
    });
  }

  attach();
  setTimeout(attach,300);
  setTimeout(attach,900);
})();
</script>


<script id="eratguard-radial-v13-spiral-js">
(function(){
  if(window.__ERATGUARD_RADIAL_V13_SPIRAL__) return;
  window.__ERATGUARD_RADIAL_V13_SPIRAL__ = true;

  var soundEnabled = false;
  var audioCtx = null;
  var unlocked = false;

  function qsa(sel){ return Array.prototype.slice.call(document.querySelectorAll(sel)); }

  function ensureUi(){
    if(!document.querySelector(".eg-v13-spiral-overlay")){
      var overlay = document.createElement("div");
      overlay.className = "eg-v13-spiral-overlay";
      overlay.innerHTML = '<div class="eg-v13-spiral-ring r1"></div><div class="eg-v13-spiral-ring r2"></div><div class="eg-v13-spiral-ring r3"></div><div class="eg-v13-spiral-sweep"></div>';

    }

    if(!document.querySelector(".eg-v13-sound-toggle")){
      var btn = document.createElement("button");
      btn.className = "eg-v13-sound-toggle off";
      btn.type = "button";
      btn.innerHTML = "🔇";
      btn.setAttribute("aria-label","Ses aç/kapat");
      btn.addEventListener("click", function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        soundEnabled = !soundEnabled;
        btn.classList.toggle("off", !soundEnabled);
        btn.innerHTML = soundEnabled ? "♪" : "🔇";
        unlockAudio();
        if(soundEnabled){
          playReady();
          replaySpiral();
        }
      });
      document.body.appendChild(btn);
    }

    if(!document.querySelector(".eg-v13-ready-flash")){
      var flash = document.createElement("div");
      flash.className = "eg-v13-ready-flash";
      flash.textContent = "KORUMA AKTİF · 12P HAZIR";
      document.body.appendChild(flash);
    }
  }

  function unlockAudio(){
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === "suspended") audioCtx.resume();
      unlocked = true;
    }catch(e){}
  }

  document.addEventListener("pointerdown", unlockAudio, {once:true, passive:true});
  document.addEventListener("touchstart", unlockAudio, {once:true, passive:true});

  function tone(freq, dur, type, gainValue, delay){
    if(!soundEnabled || !unlocked || !audioCtx) return;
    try{
      var t0 = audioCtx.currentTime + (delay || 0);
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();

      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freq, t0);
      osc.frequency.exponentialRampToValueAtTime(Math.max(80, freq * 0.72), t0 + dur);

      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(gainValue || 0.018, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }catch(e){}
  }

  function playTick(i){
    tone(520 + (i * 17), 0.055, "triangle", 0.012, 0);
    tone(980 + (i * 11), 0.035, "sine", 0.006, 0.012);
  }

  function playReady(){
    tone(420, 0.12, "sine", 0.018, 0);
    tone(640, 0.16, "triangle", 0.012, 0.05);
    tone(860, 0.18, "sine", 0.010, 0.11);
  }

  function centerPoint(){
    var core =
      document.querySelector(".core") ||
      document.querySelector(".center") ||
      document.querySelector("[class*='core']") ||
      document.querySelector("[class*='center']");
    if(core){
      var r = core.getBoundingClientRect();
      return {x:r.left + r.width/2, y:r.top + r.height/2};
    }
    return {x:window.innerWidth/2, y:window.innerHeight*0.42};
  }

  function collectSlices(){
    var items = qsa(".seg-link");
    if(items.length < 6) items = qsa("a[href^='/u/']");
    if(items.length < 6) items = qsa("[data-eg-url]");
    var seen = new Set();
    items = items.filter(function(el){
      if(!el || seen.has(el)) return false;
      seen.add(el);
      var text = (el.innerText || el.textContent || "").trim();
      var href = el.getAttribute("href") || el.getAttribute("data-eg-url") || "";
      return text || href;
    });
    return items.slice(0,12);
  }

  function animateOverlay(){
    var rings = qsa(".eg-v13-spiral-ring");
    var sweep = document.querySelector(".eg-v13-spiral-sweep");

    rings.forEach(function(r,i){
      r.animate([
        {opacity:0, transform:"scale(.22) rotate("+(i*30)+"deg)"},
        {opacity:.82, transform:"scale(1) rotate("+(160+i*90)+"deg)", offset:.58},
        {opacity:.10, transform:"scale(1.18) rotate("+(300+i*140)+"deg)"}
      ], {
        duration:2200 + i*180,
        easing:"cubic-bezier(.16,.9,.24,1)",
        fill:"forwards"
      });
    });

    if(sweep){
      sweep.animate([
        {opacity:0, transform:"scale(.22) rotate(-160deg)"},
        {opacity:.82, transform:"scale(1) rotate(160deg)", offset:.62},
        {opacity:0, transform:"scale(1.08) rotate(330deg)"}
      ], {
        duration:2850,
        easing:"cubic-bezier(.16,.9,.24,1)",
        fill:"forwards"
      });
    }
  }

  function flashReady(){
    var f = document.querySelector(".eg-v13-ready-flash");
    if(!f) return;
    f.animate([
      {opacity:0, transform:"translateX(-50%) translateY(10px) scale(.96)"},
      {opacity:1, transform:"translateX(-50%) translateY(0) scale(1)", offset:.18},
      {opacity:1, transform:"translateX(-50%) translateY(0) scale(1)", offset:.74},
      {opacity:0, transform:"translateX(-50%) translateY(-8px) scale(.98)"}
    ], {
      duration:1900,
      easing:"cubic-bezier(.2,.8,.2,1)",
      fill:"both"
    });
  }

  function animateSlices(){
    var items = collectSlices();
    var c = centerPoint();

    items.forEach(function(el,i){
      var r = el.getBoundingClientRect();
      var ex = r.left + r.width/2;
      var ey = r.top + r.height/2;
      var dx = c.x - ex;
      var dy = c.y - ey;
      var spin = 260 + i * 28;
      var delay = 260 + i * 155;

      el.classList.add("eg-v13-spawned");
      el.style.pointerEvents = "none";

      setTimeout(function(){ playTick(i); }, delay);

      el.animate([
        {
          opacity:0,
          filter:"blur(8px) brightness(1.8)",
          transform:"translate("+dx+"px,"+dy+"px) scale(.16) rotate("+spin+"deg)"
        },
        {
          opacity:.72,
          filter:"blur(2px) brightness(1.65)",
          transform:"translate("+(dx*.36)+"px,"+(dy*.36)+"px) scale(.78) rotate("+(spin*.38)+"deg)",
          offset:.62
        },
        {
          opacity:1,
          filter:"blur(0) brightness(1.18)",
          transform:"translate(0,0) scale(1.035) rotate(0deg)",
          offset:.86
        },
        {
          opacity:1,
          filter:"blur(0) brightness(1)",
          transform:"translate(0,0) scale(1) rotate(0deg)"
        }
      ], {
        duration:1350,
        delay:delay,
        easing:"cubic-bezier(.15,.95,.2,1)",
        fill:"both"
      }).onfinish = function(){
        el.style.pointerEvents = "";
      };
    });

    var total = 260 + items.length * 155 + 1350;
    setTimeout(function(){
      playReady();
      flashReady();
    }, total + 60);
  }

  function pulseCore(){
    var core =
      document.querySelector(".core") ||
      document.querySelector(".center") ||
      document.querySelector("[class*='core']") ||
      document.querySelector("[class*='center']");
    if(core){
      core.classList.remove("eg-v13-core-pulse");
      void core.offsetWidth;
      core.classList.add("eg-v13-core-pulse");
    }
  }

  function replaySpiral(){
    ensureUi();
    pulseCore();
    animateOverlay();
    animateSlices();
  }

  window.EratGuardReplaySpiral = replaySpiral;

  function boot(){
    ensureUi();
    setTimeout(replaySpiral, 220);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  }else{
    boot();
  }
})();
</script>

    ], {
      duration:1900,
      easing:"cubic-bezier(.2,.8,.2,1)",
      fill:"both"
    });
  }

  function replay(){
    if(running) return;
    running = true;

    ensureUi();
    hideNumberBadges(document);

    var items = collectSlices();
    var layer = document.querySelector(".eg-v15-clone-layer");
    if(!layer || !items.length){
      running = false;
      return;
    }

    layer.innerHTML = "";
    document.body.classList.add("eg-v15-deploying");

    var c = centerPoint();
    animateEnergy();

    var lastEnd = 0;

    items.forEach(function(el,i){
      hideNumberBadges(el);

      var r = el.getBoundingClientRect();
      if(!r.width || !r.height) return;

      var clone = el.cloneNode(true);
      clone.removeAttribute("id");
      clone.classList.add("eg-v15-clone");

      clone.style.width = r.width + "px";
      clone.style.height = r.height + "px";
      clone.style.left = c.x + "px";
      clone.style.top = c.y + "px";
      clone.style.opacity = "0";

      hideNumberBadges(clone);
      layer.appendChild(clone);

      var endLeft = r.left + r.width/2;
      var endTop = r.top + r.height/2;
      var midAngle = -150 + i * 34;
      var midRadius = 60 + i * 13;
      var midLeft = c.x + Math.cos(midAngle * Math.PI / 180) * midRadius;
      var midTop = c.y + Math.sin(midAngle * Math.PI / 180) * midRadius;

      var delay = 180 + i * 165;
      var duration = 1450;
      lastEnd = Math.max(lastEnd, delay + duration);

      setTimeout(function(){ playLaunch(i); }, delay);

      var anim = clone.animate([
        {
          left:c.x + "px",
          top:c.y + "px",
          opacity:0,
          filter:"blur(8px) brightness(1.9)",
          transform:"translate(-50%,-50%) scale(.12) rotate("+(260+i*28)+"deg)"
        },
        {
          left:midLeft + "px",
          top:midTop + "px",
          opacity:.70,
          filter:"blur(2px) brightness(1.65)",
          transform:"translate(-50%,-50%) scale(.58) rotate("+(145+i*18)+"deg)",
          offset:.46
        },
        {
          left:endLeft + "px",
          top:endTop + "px",
          opacity:1,
          filter:"blur(0) brightness(1.25)",
          transform:"translate(-50%,-50%) scale(1.06) rotate(-4deg)",
          offset:.88
        },
        {
          left:endLeft + "px",
          top:endTop + "px",
          opacity:1,
          filter:"blur(0) brightness(1)",
          transform:"translate(-50%,-50%) scale(1) rotate(0deg)"
        }
      ], {
        delay:delay,
        duration:duration,
        easing:"cubic-bezier(.15,.95,.2,1)",
        fill:"both"
      });

      anim.onfinish = function(){
        playLock(i);
      };
    });

    setTimeout(function(){
      playReady();
      flashReady();
      document.body.classList.remove("eg-v15-deploying");
      setTimeout(function(){
        layer.innerHTML = "";
        running = false;
      }, 150);
    }, lastEnd + 180);
  }

  window.EratGuardReplaySpiral = replay;
  window.EratGuardV15Replay = replay;

  function boot(){
    ensureUi();
    hideNumberBadges(document);
    setTimeout(replay, 350);
    setTimeout(function(){ hideNumberBadges(document); }, 2200);
    setTimeout(function(){ hideNumberBadges(document); }, 4200);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  }else{
    boot();
  }
})();
</script>

</body>
</html>
