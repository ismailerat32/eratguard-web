<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>EratGuard PRO · Bildirim İzni</title>

<style id="stage5d2-modern-notification-permission-v1">
:root{
  --bg:#050810;
  --panel:#0a1020;
  --line:#17243d;
  --line2:#244064;
  --text:#e8f4ff;
  --muted:#8aa6c4;
  --cyan:#00c8f0;
  --green:#8dff3f;
  --purple:#9b6dff;
  --shadow:0 24px 80px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:16px;
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  background:
    modern-panel-gradient(circle at top left,rgba(0,200,240,.13),transparent 32%),
    modern-panel-gradient(circle at bottom right,rgba(141,255,63,.10),transparent 36%),
    linear-gradient(180deg,var(--bg),#03050a);
}
.card{
  width:min(560px,100%);
  border:1px solid var(--line2);
  border-radius:30px;
  background:
    modern-panel-gradient(circle at top right,rgba(0,200,240,.13),transparent 34%),
    linear-gradient(180deg,rgba(15,27,49,.98),rgba(7,13,24,.98));
  box-shadow:var(--shadow);
  padding:28px;
  text-align:center;
}
.logo{
  width:74px;
  height:74px;
  margin:0 auto 16px;
  border-radius:24px;
  display:grid;
  place-items:center;
  font-size:34px;
  font-weight:1000;
  color:#041018;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  box-shadow:0 0 32px rgba(0,200,240,.22);
}
.kicker{color:var(--cyan);font-size:12px;font-weight:1000;letter-spacing:3px}
h1{margin:8px 0 0;font-size:clamp(34px,7vw,54px);line-height:1}
p{margin:14px auto 0;max-width:440px;color:var(--muted);line-height:1.5}
.actions{
  margin-top:22px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.btn{
  border:1px solid var(--line2);
  background:rgba(255,255,255,.035);
  color:var(--text);
  border-radius:16px;
  padding:13px 16px;
  font-weight:1000;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:150px;
}
.btn.primary{
  border:0;
  color:#031018;
  background:linear-gradient(135deg,var(--cyan),var(--green));
}
.note{
  margin-top:18px;
  color:#526c89;
  font-size:12px;
  line-height:1.45;
}
@media(max-width:520px){
  .card{padding:22px;border-radius:26px}
  .actions{display:grid}
  .btn{width:100%}
}
</style>
</head>

<body>
<section class="card">
  <div class="logo">E</div>
  <div class="kicker">ERATGUARD PRO</div>
  <h1>Bildirimleri Aç</h1>
  <p>Güvenlik uyarıları, lisans bilgilendirmeleri ve önemli sistem duyurularını zamanında almak için tarayıcı bildirimlerine izin ver.</p>

  <div class="actions">
    <button class="btn primary" type="button" onclick="enablePermission()">İzin Ver →</button>
    <button class="btn" type="button" onclick="skipPermission()">Şimdilik Geç</button>
  </div>

  <div class="note">İzin tercihini daha sonra Bildirim Ayarları ekranından değiştirebilirsin.</div>
</section>

<script id="stage5d2-modern-notification-permission-js-v1">
function goNext(){
  window.location.href = "/u/notifications";
}

function enablePermission(){
  try{
    if("Notification" in window){
      Notification.requestPermission().then(function(result){
        try{
          if(result === "granted"){
            new Notification("EratGuard PRO", {body:"Bildirimler aktif. Koruma uyarıları hazır."});
          }
        }catch(e){}
        goNext();
      }).catch(function(){ goNext(); });
    }else{
      goNext();
    }
  }catch(e){
    goNext();
  }
}

function skipPermission(){
  goNext();
}
</script>
</body>
</html>
