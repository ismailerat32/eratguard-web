<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EratGuard PRO · Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --green:#2dffa0;
  --cyan:#22d3ee;
  --grid-cols: 1fr 1fr 90px 1fr 1fr;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;background:radial-gradient(ellipse 90% 55% at 50% 0%, #0a2226 0%, #061318 40%, #030607 100%);
  font-family:'DM Mono',monospace;color:#fff;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}

.wrap{position:relative;min-height:100dvh;padding-bottom:24px}

/* ambient sweep + vignette */
.sweep{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.sweep::before{content:"";position:absolute;top:-10%;left:0;width:20%;height:140%;
  background:linear-gradient(90deg,transparent,rgba(34,211,238,0.16),transparent);
  animation:eg-sweep 7s ease-in-out infinite}
@keyframes eg-sweep{0%{transform:translateX(-30%) rotate(8deg)}100%{transform:translateX(130%) rotate(8deg)}}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:0;
  box-shadow:inset 0 0 90px 20px rgba(0,0,0,0.55)}

/* header */
.header{position:relative;z-index:1;padding:22px 16px 10px}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px}
.badge-active{display:flex;align-items:center;gap:8px;border-radius:10px;padding:8px 11px;
  background:rgba(45,255,160,0.1);border:1px solid rgba(45,255,160,0.55);box-shadow:0 0 14px rgba(45,255,160,0.2)}
.badge-active i{color:var(--green);filter:drop-shadow(0 0 4px var(--green));font-size:15px}
.badge-active .t{font-size:13px;font-weight:700;color:var(--green)}
.badge-active .s{font-size:10px;color:rgba(148,168,160,0.7)}
.brand{text-align:center}
.brand .name{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:900;font-style:italic}
.brand .name .pro{-webkit-text-stroke:1px var(--green);color:transparent}
.brand .sub{font-size:9px;color:rgba(148,168,160,0.6);letter-spacing:0.05em;margin-top:3px}
.clockbox{text-align:right}
.clockbox .time{font-size:15px;font-weight:500}
.clockbox .date{font-size:10px;color:rgba(148,168,160,0.55)}
.clockbox .status{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:3px}
.clockbox .status .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:eg-pulse 1.6s ease-in-out infinite}
.clockbox .status span.label{font-size:10px;color:var(--green)}
@keyframes eg-pulse{0%,100%{opacity:.55}50%{opacity:1}}

.status-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;height:66px}
.status-card{border-radius:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(45,255,160,0.2);
  box-shadow:0 4px 10px -4px rgba(0,0,0,0.5), 0 0 8px rgba(45,255,160,0.09);
  display:flex;flex-direction:column;justify-content:space-between;padding:8px 11px;min-width:0}
.status-card .l{font-size:10px;color:rgba(148,168,160,0.65)}
.spark{width:100%;height:22px}
.spark polyline{stroke-dasharray:220;stroke-dashoffset:220;animation:eg-draw 1.4s .3s ease-out forwards;
  filter:drop-shadow(0 0 3px var(--green))}
@keyframes eg-draw{to{stroke-dashoffset:0}}
.score-card{border-radius:11px;background:rgba(45,255,160,0.07);border:1px solid rgba(45,255,160,0.35);
  box-shadow:0 6px 14px -4px rgba(0,0,0,0.55), 0 0 16px rgba(45,255,160,0.2);
  display:flex;align-items:center;justify-content:center;gap:8px;min-width:0;
  animation:eg-breathe-soft 2.8s ease-in-out infinite}
@keyframes eg-breathe-soft{0%,100%{opacity:.85}50%{opacity:1}}
.score-card svg{filter:drop-shadow(0 0 3px var(--green))}
.score-card .l{font-size:9px;color:rgba(148,168,160,0.7)}
.score-card .v{font-size:19px;font-weight:700;color:var(--green);line-height:1}
.score-card .v .pct{font-size:11px}
.threat-card{align-items:center;text-align:center;gap:3px}
.threat-card .v{font-size:12px;font-weight:600;color:var(--green)}

/* module grid */
.modgrid{position:relative;z-index:1;padding:0 16px}
.row{display:grid;gap:11px;margin-bottom:11px}
.core-wrap{text-align:center;margin:-2px 0 11px}
.core-wrap .t{font-size:14px;font-weight:600;color:#eaf4f0}
.core-wrap .s{font-size:10px;color:rgba(148,168,160,0.55)}

.ai-core{position:relative;width:90px;height:90px;justify-self:center;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border-radius:50%}
.ai-core .halo{position:absolute;inset:-13px;border-radius:50%;
  background:radial-gradient(circle,rgba(45,255,160,0.2),transparent 70%);animation:eg-breathe-soft2 2.6s ease-in-out infinite}
@keyframes eg-breathe-soft2{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.ai-core .ring-outer{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--cyan);
  box-shadow:0 0 16px rgba(34,211,238,0.65);animation:eg-spin 14s linear infinite}
@keyframes eg-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ai-core .ring-inner{position:absolute;inset:8px;border-radius:50%;border:1.5px solid var(--green);
  box-shadow:0 0 14px rgba(45,255,160,0.65)}
.ai-core i{color:var(--green);filter:drop-shadow(0 0 6px var(--green));font-size:22px}
.ai-core .lbl{font-size:9px;font-weight:700;color:var(--green);letter-spacing:0.08em;margin-top:3px;
  text-shadow:0 0 6px var(--green)}

/* module card */
.card{position:relative;min-height:115px;perspective:700px}
.card-wall{position:absolute;inset:0;background:linear-gradient(180deg,#071613 0%,#030807 100%);
  border:1px solid rgba(45,255,160,0.13);
  clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
  transform:rotateX(6deg) translate(3px,4px);transform-origin:50% 0%}
.card-shell{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 7px 9px;background:linear-gradient(180deg,#102826 0%,#081213 100%);
  border:1.5px solid var(--green);border-top:2px solid var(--cyan);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06), 0 6px 14px -6px rgba(0,0,0,0.65);
  filter:drop-shadow(0 0 8px rgba(45,255,160,0.47));
  clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
  transform:rotateX(6deg);transform-origin:50% 0%}
.card-edge-pulse{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(34,211,238,0.13),transparent 40%);
  animation:eg-edge-pulse 3.2s ease-in-out infinite}
@keyframes eg-edge-pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-icon{position:relative;width:30px;height:30px;flex-shrink:0;border-radius:50%;margin-bottom:6px;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%, rgba(45,255,160,0.4), rgba(34,211,238,0.16));
  border:1.5px solid var(--green);box-shadow:0 0 10px rgba(45,255,160,0.6), 0 0 18px rgba(34,211,238,0.33)}
.card-icon .glow{position:absolute;inset:-5px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(45,255,160,0.33),transparent 70%);
  animation:eg-icon-glow 3s ease-in-out infinite}
@keyframes eg-icon-glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.card-icon i{color:var(--green);font-size:15px;filter:drop-shadow(0 0 3px var(--green))}
.card-title{font-size:12px;font-weight:600;color:#eaf4f0;line-height:1.2;padding:0 4px}
.card-sub{font-size:10px;color:rgba(148,168,160,0.55);line-height:1.25;padding:0 4px;margin-top:2px}

.card-base-glow{position:absolute;left:50%;bottom:-8px;width:40px;height:15px;border-radius:50%;
  transform:translateX(-50%);pointer-events:none;filter:blur(2px);
  background:radial-gradient(ellipse, rgba(45,255,160,0.53), transparent 70%)}
.card-beam{position:absolute;left:50%;top:-27px;width:11px;height:27px;transform:translateX(-50%);
  transform-origin:bottom center;pointer-events:none;
  background:linear-gradient(to top, var(--cyan), transparent);
  filter:blur(0.5px) drop-shadow(0 0 6px var(--cyan));
  animation:eg-beam-pulse 2.4s ease-in-out infinite}
@keyframes eg-beam-pulse{0%,100%{opacity:.55;transform:translateX(-50%) scaleY(0.8)}50%{opacity:1;transform:translateX(-50%) scaleY(1.15)}}

.card-badge{position:absolute;top:-9px;right:-8px;min-width:24px;height:24px;padding:0 5px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  background:#ff2d2d;border:2px solid #050b0d;box-shadow:0 0 14px rgba(255,45,45,1);
  color:#fff;font-weight:700;font-size:13px;z-index:2;animation:eg-badge-pulse 1.8s ease-in-out infinite}
@keyframes eg-badge-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* one-shot entrance: fall + lock-flash, driven by an inline --delay custom property per card */
.card{animation:eg-card-fall 950ms cubic-bezier(0.16,0.8,0.24,1) both;animation-delay:var(--delay,0ms)}
@keyframes eg-card-fall{
  0%{opacity:0;transform:translateY(-150px) scale(0.9)}
  55%{opacity:1}
  78%{transform:translateY(7px) scale(1.02)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.lock-flash{position:absolute;top:36%;left:50%;width:32px;height:32px;border-radius:50%;
  border:2px solid var(--green);box-shadow:0 0 14px var(--green);opacity:0;pointer-events:none;
  animation:eg-lock-flash 0.5s ease-out both;animation-delay:calc(var(--delay,0ms) + 870ms)}
@keyframes eg-lock-flash{0%{opacity:.95;transform:translate(-50%,-50%) scale(0.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.4)}}

/* bottom stats */
.stats{position:relative;z-index:1;padding:16px 16px 0}
.stats-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-radius:20px;padding:16px 11px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(45,255,160,0.18);
  box-shadow:0 0 14px rgba(45,255,160,0.08), inset 0 1px 0 rgba(255,255,255,0.04)}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;min-width:0}
.stat .ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(45,255,160,0.12);border:1px solid rgba(45,255,160,0.4);box-shadow:0 0 8px rgba(45,255,160,0.27)}
.stat .ic i{color:var(--green);font-size:15px;filter:drop-shadow(0 0 2px var(--green))}
.stat .v{font-size:16px;font-weight:700;color:#eaf4f0;line-height:1}
.stat .u{font-size:9px;color:rgba(148,168,160,0.5);line-height:1}
.value-flash{animation:eg-value-flash 0.5s ease-out}
@keyframes eg-value-flash{0%{color:var(--green);transform:scale(1.15)}100%{color:#eaf4f0;transform:scale(1)}}

/* bottom nav */
.nav{position:relative;z-index:1;padding:11px 16px 16px}
.nav-inner{display:flex;align-items:center;justify-content:space-between;border-radius:20px;padding:8px 11px;
  background:rgba(8,16,17,0.9);border:1px solid rgba(45,255,160,0.15);
  box-shadow:0 10px 24px -8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 8px;min-width:0}
.nav-item i{font-size:20px;color:rgba(148,168,160,0.55)}
.nav-item.active i{color:var(--green)}
.nav-item span{font-size:10px;white-space:nowrap;color:rgba(148,168,160,0.5)}
.nav-item.active span{color:var(--green)}
.nav-ai{position:relative;width:62px;height:62px;border-radius:50%;margin-top:-22px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%, #123328, #050b0d);
  border:1px solid rgba(45,255,160,0.4);box-shadow:0 0 14px rgba(45,255,160,0.27), 0 0 22px rgba(34,211,238,0.13)}
.nav-ai .ring{position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(34,211,238,0.2)}
.nav-ai span{font-size:17px;font-weight:700;color:var(--green);letter-spacing:0.03em}

/* module detail sheet */
.sheet-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;
  background:rgba(2,6,5,0.75)}
.sheet-overlay.open{display:flex}
.sheet{width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:26px;display:flex;flex-direction:column;gap:20px;
  background:#081213;border:1px solid rgba(45,255,160,0.18);border-bottom:none;
  animation:eg-sheet-in 0.3s cubic-bezier(0.16,1,0.3,1) both}
@keyframes eg-sheet-in{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between}
.sheet-head .left{display:flex;align-items:center;gap:14px}
.sheet-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  background:rgba(45,255,160,0.1);border:1px solid rgba(45,255,160,0.3);flex-shrink:0}
.sheet-icon i{color:var(--green);font-size:26px}
.sheet-meta .id{font-size:13px;color:rgba(148,168,160,0.6)}
.sheet-meta .title{font-size:20px;font-weight:600}
.sheet-close{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(148,168,160,0.7)}
.sheet-sub{font-size:17px;color:rgba(200,215,208,0.75)}
.sheet-rows{display:flex;flex-direction:column;gap:10px}
.sheet-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-radius:11px;background:rgba(255,255,255,0.03)}
.sheet-row .k{font-size:15px;color:rgba(148,168,160,0.65)}
.sheet-row .v{font-size:15px;font-weight:500;color:var(--green)}
.sheet-open{display:flex;align-items:center;justify-content:center;gap:8px;padding:17px;border-radius:16px;font-weight:600;font-size:17px;
  background:rgba(45,255,160,0.1);border:1px solid rgba(45,255,160,0.33);color:var(--green)}
.sheet-route{text-align:center;margin-top:-8px;font-size:13px;color:rgba(148,168,160,0.4)}
</style>
</head>
<body>
<div class="wrap">
  <div class="sweep"></div>
  <div class="vignette"></div>

  <!-- header -->
  <div class="header">
    <div class="header-row">
      <div class="badge-active">
        <i class="fa-solid fa-shield-halved"></i>
        <div><div class="t">KORUMA AKTİF</div><div class="s">Sistem tam koruma altında</div></div>
      </div>
      <div class="brand">
        <div class="name">EratGuard <span class="pro">PRO</span></div>
        <div class="sub">AI DESTEKLİ SMS GÜVENLİK SİSTEMİ</div>
      </div>
      <div class="clockbox">
        <div class="time" id="eg-time">--:--:--</div>
        <div class="date" id="eg-date">-</div>
        <div class="status"><span class="dot"></span><span class="label">ÇEVRİMİÇİ</span></div>
      </div>
    </div>

    <div class="status-trio">
      <div class="status-card">
        <div class="l">7 GÜNLÜK</div>
        <svg class="spark" viewBox="0 0 98 30" preserveAspectRatio="none">
          <polyline points="0,26 14,22 28,24 42,13 56,17 70,7 84,12 98,3" fill="none" stroke="#2dffa0" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="status-card score-card">
        <svg width="42" height="42" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(45,255,160,0.15)" stroke-width="3"/>
          <circle id="eg-score-ring" cx="18" cy="18" r="15" fill="none" stroke="#2dffa0" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="94.2" transform="rotate(-90 18 18)"
            style="transition:stroke-dashoffset .1s linear"/>
        </svg>
        <div><div class="l">GÜVENLİK</div><div class="v"><span id="eg-score-val">0</span><span class="pct">%</span></div></div>
      </div>
      <div class="status-card threat-card">
        <div class="l">TEHDİT</div>
        <div class="v">ÇOK DÜŞÜK</div>
      </div>
    </div>
  </div>

  <!-- module grid -->
  <div class="modgrid">
    <div class="row" id="eg-row-1" style="grid-template-columns:var(--grid-cols)"></div>

    <div class="row" id="eg-row-2" style="grid-template-columns:var(--grid-cols);align-items:center">
      <!-- populated by JS: card, card, ai-core, card, card -->
    </div>
    <div class="core-wrap">
      <div class="t">Ana Koruma Çekirdeği</div>
      <div class="s">Sistem aktif ve senkronize</div>
    </div>

    <div class="row" id="eg-row-3" style="grid-template-columns:var(--grid-cols)"></div>
  </div>

  <!-- bottom stats -->
  <div class="stats">
    <div class="stats-inner">
      <div class="stat"><span class="ic"><i class="fa-solid fa-shield-halved"></i></span><div class="v">1.247</div><div class="u">SMS</div></div>
      <div class="stat"><span class="ic"><i class="fa-solid fa-satellite-dish"></i></span><div class="v" id="eg-scan-val">356</div><div class="u">SMS</div></div>
      <div class="stat"><span class="ic"><i class="fa-solid fa-bullseye"></i></span><div class="v">99.8%</div><div class="u">Başarı</div></div>
      <div class="stat"><span class="ic"><i class="fa-solid fa-wave-square"></i></span><div class="v">Mükemmel</div><div class="u">Her şey yolunda</div></div>
    </div>
  </div>

  <!-- bottom nav -->
  <div class="nav">
    <div class="nav-inner">
      <button class="nav-item active"><i class="fa-solid fa-table-cells-large"></i><span>Ana Panel</span></button>
      <button class="nav-item"><i class="fa-solid fa-bolt"></i><span>Hızlı İşlemler</span></button>
      <button class="nav-ai"><span class="ring"></span><span>AI</span></button>
      <button class="nav-item"><i class="fa-solid fa-shield-halved"></i><span>Canlı Koruma</span></button>
      <button class="nav-item"><i class="fa-solid fa-user"></i><span>Profil</span></button>
    </div>
  </div>
</div>

<!-- module detail sheet -->
<div class="sheet-overlay" id="eg-sheet-overlay">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-head">
      <div class="left">
        <span class="sheet-icon"><i id="eg-sheet-icon" class="fa-solid fa-shield-halved"></i></span>
        <div class="sheet-meta">
          <div class="id" id="eg-sheet-id">MODÜL 01</div>
          <div class="title" id="eg-sheet-title">Spam Koruması</div>
        </div>
      </div>
      <button class="sheet-close" id="eg-sheet-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p class="sheet-sub" id="eg-sheet-sub"></p>
    <div class="sheet-rows" id="eg-sheet-rows"></div>
    <a class="sheet-open" id="eg-sheet-open" href="#">Modülü Aç <i class="fa-solid fa-chevron-right"></i></a>
    <div class="sheet-route" id="eg-sheet-route"></div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Module data. Routes marked "GÖZDEN GEÇİR" are best-guess placeholders —
// confirm/fix against your real @app.route list before shipping.
// ---------------------------------------------------------------------------
const MODULES = [
  { id:1, title:'Spam Koruması', sub:"Gelen SMS'leri akıllıca filtrele", icon:'fa-shield-halved', route:'/u/protection',
    rows:[['Durum','Aktif'],['Bugün filtrelenen','128'],['Hassasiyet','Yüksek']] },
  { id:2, title:'AI Analiz', sub:'Yapay zeka ile akıllı analiz', icon:'fa-brain', route:'/u/analysis',
    rows:[['Risk skoru','12 / 100'],['İncelenen olay','342'],['Model','v2.4']] },
  { id:3, title:'Risk Tarama', sub:'Tehlikeleri tara, güvende kal', icon:'fa-satellite-dish', route:'/u/sms-risk-test',
    rows:[['Taranan öğe','1.204'],['Şüpheli bulgu','3'],['Süre','0.8sn/öğe']] },
  { id:4, title:'Engellenenler', sub:'Engellenen numaralar ve mesajlar', icon:'fa-ban', route:'/u/blocked', badge:4,
    rows:[['Toplam engelli','57'],['Bu hafta eklenen','4'],['Otomatik ekleme','Açık']] },
  { id:5, title:'SMS Merkezi', sub:'Tüm mesajların yönetim merkezi', icon:'fa-comments', route:'/u/sms-actions-center', badge:6,

function cardHtml(mod, delayMs){
  const badge = mod.badge ? `<span class="card-badge">${mod.badge}</span>` : '';
  return `
  <button class="card" style="--delay:${delayMs}ms" onclick="openSheet(${mod.id})">
    <div class="card-wall"></div>
    <div class="card-shell">
      <div class="card-edge-pulse"></div>
      <div class="lock-flash"></div>
      <div class="card-icon"><span class="glow"></span><i class="fa-solid ${mod.icon}"></i></div>
      <div class="card-title">${mod.title}</div>
      <div class="card-sub">${mod.sub}</div>
    </div>
    <div class="card-base-glow"></div>
    <div class="card-beam"></div>
    ${badge}
  </button>`;
}

function coreHtml(){
  return `
  <div class="ai-core">
    <span class="halo"></span><span class="ring-outer"></span><span class="ring-inner"></span>
    <i class="fa-solid fa-shield-halved"></i><span class="lbl">AI</span>
  </div>`;
}

(function renderGrid(){
  const row1 = document.getElementById('eg-row-1');
  const row2 = document.getElementById('eg-row-2');
  const row3 = document.getElementById('eg-row-3');
  const STAGGER = 100;

  row1.innerHTML =
    cardHtml(MODULES[0], 0*STAGGER) + cardHtml(MODULES[1], 1*STAGGER) +
    '<div></div>' +
    cardHtml(MODULES[2], 2*STAGGER) + cardHtml(MODULES[3], 3*STAGGER);

  row2.innerHTML =
    cardHtml(MODULES[4], 4*STAGGER) + cardHtml(MODULES[5], 5*STAGGER) +
    coreHtml() +
    cardHtml(MODULES[6], 6*STAGGER) + cardHtml(MODULES[7], 7*STAGGER);

  row3.innerHTML =
    cardHtml(MODULES[8], 8*STAGGER) + cardHtml(MODULES[9], 9*STAGGER) +
    '<div></div>' +
    cardHtml(MODULES[10], 10*STAGGER) + cardHtml(MODULES[11], 11*STAGGER);
})();

// live clock
function tickClock(){
  const now = new Date();
  document.getElementById('eg-time').textContent = now.toLocaleTimeString('tr-TR',{hour12:false});
  document.getElementById('eg-date').textContent = now.toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'});
}
tickClock();
setInterval(tickClock, 1000);

// security score count-up
(function animateScore(){
  const target = 100, duration = 900, start = performance.now();
  const ring = document.getElementById('eg-score-ring');
  const val = document.getElementById('eg-score-val');
  const CIRC = 94.2;
  function step(t){
    const p = Math.min(1, (t-start)/duration);
    const eased = 1 - Math.pow(1-p, 3);
    const score = Math.round(target*eased);
    val.textContent = score;
    ring.style.strokeDashoffset = CIRC - (score/100)*CIRC;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();

// live-ticking scan counter (purely cosmetic — wire to a real endpoint when ready)
let scanCount = 356;
setInterval(function(){
  scanCount++;
  const el = document.getElementById('eg-scan-val');
  el.textContent = scanCount;
  el.classList.remove('value-flash'); void el.offsetWidth; el.classList.add('value-flash');
}, 4200);

// module detail sheet
const overlay = document.getElementById('eg-sheet-overlay');
function openSheet(id){
  const mod = MODULES.find(m => m.id === id);
  if(!mod) return;
  document.getElementById('eg-sheet-icon').className = 'fa-solid ' + mod.icon;
  document.getElementById('eg-sheet-id').textContent = 'MODÜL ' + String(mod.id).padStart(2,'0');
  document.getElementById('eg-sheet-title').textContent = mod.title;
  document.getElementById('eg-sheet-sub').textContent = mod.sub;
  document.getElementById('eg-sheet-open').href = mod.route;
  document.getElementById('eg-sheet-route').textContent = mod.route;
  document.getElementById('eg-sheet-rows').innerHTML = mod.rows.map(function(r){
    return '<div class="sheet-row"><span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span></div>';
  }).join('');
  overlay.classList.add('open');
}
document.getElementById('eg-sheet-close').addEventListener('click', function(){ overlay.classList.remove('open'); });
overlay.addEventListener('click', function(){ overlay.classList.remove('open'); });
</script>
