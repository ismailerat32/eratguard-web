<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EratGuard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020e07;font-family:'DM Sans',sans-serif;color:#fff}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 100% 60% at 50% -5%,rgba(0,255,100,.14) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 10% 90%,rgba(0,180,80,.07) 0%,transparent 45%),radial-gradient(ellipse 40% 30% at 90% 70%,rgba(0,255,136,.05) 0%,transparent 40%),#020e07}
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,.4),transparent);z-index:2;animation:scanLine 4s ease-in-out infinite;top:0}
@keyframes scanLine{0%{top:0;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
.corner{position:fixed;width:20px;height:20px;z-index:3}
.corner.tl{top:16px;left:16px;border-top:1.5px solid rgba(0,255,136,.4);border-left:1.5px solid rgba(0,255,136,.4)}
.corner.tr{top:16px;right:16px;border-top:1.5px solid rgba(0,255,136,.4);border-right:1.5px solid rgba(0,255,136,.4)}
.corner.bl{bottom:16px;left:16px;border-bottom:1.5px solid rgba(0,255,136,.4);border-left:1.5px solid rgba(0,255,136,.4)}
.corner.br{bottom:16px;right:16px;border-bottom:1.5px solid rgba(0,255,136,.4);border-right:1.5px solid rgba(0,255,136,.4)}
.pts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;background:radial-gradient(circle,#00ff88,transparent);opacity:0;animation:pf var(--d) var(--dl) infinite ease-in-out}
@keyframes pf{0%{opacity:0;transform:translateY(0) scale(0)}15%{opacity:.8;transform:translateY(-10px) scale(1)}85%{opacity:.2}100%{opacity:0;transform:translateY(-140px) scale(0)}}
.page{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 28px 64px;gap:48px}
.top{display:flex;flex-direction:column;align-items:center;gap:28px;animation:fadeD .9s cubic-bezier(.16,1,.3,1) both}
.shield-wrap{position:relative;width:110px;height:110px;display:grid;place-items:center}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,255,136,.12);animation:rp 3s ease-in-out infinite}
.r1{width:110px;height:110px;animation-delay:0s}
.r2{width:155px;height:155px;animation-delay:.5s;border-color:rgba(0,255,136,.07)}
.r3{width:200px;height:200px;animation-delay:1s;border-color:rgba(0,255,136,.04)}
@keyframes rp{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.06);opacity:1}}
.shield-bg{width:90px;height:90px;border-radius:26px;background:linear-gradient(145deg,rgba(0,40,20,.9),rgba(0,20,10,.95));border:1.5px solid rgba(0,255,136,.25);display:grid;place-items:center;position:relative;z-index:2;box-shadow:0 0 0 1px rgba(0,255,136,.05),0 20px 50px rgba(0,0,0,.5),0 0 40px rgba(0,255,136,.12),inset 0 1px 0 rgba(255,255,255,.05);animation:sg 2.5s ease-in-out infinite}
@keyframes sg{0%,100%{box-shadow:0 0 0 1px rgba(0,255,136,.05),0 20px 50px rgba(0,0,0,.5),0 0 40px rgba(0,255,136,.12),inset 0 1px 0 rgba(255,255,255,.05)}50%{box-shadow:0 0 0 1px rgba(0,255,136,.1),0 20px 50px rgba(0,0,0,.5),0 0 70px rgba(0,255,136,.28),inset 0 1px 0 rgba(255,255,255,.05)}}
.brand{text-align:center}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:50px;font-weight:900;letter-spacing:-2px;line-height:1;color:#fff}
.brand-name span{color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,.4)}
.brand-line{width:40px;height:2px;background:linear-gradient(90deg,transparent,#00ff88,transparent);margin:12px auto 10px}
.brand-sub{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:300}
.mid{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;animation:fadeU .8s cubic-bezier(.16,1,.3,1) .2s both}
.tagline{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.3}
.tagline em{display:block;color:#00ff88;font-style:normal;font-size:20px;text-shadow:0 0 20px rgba(0,255,136,.3);margin-top:4px}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.pill{display:flex;align-items:center;gap:6px;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.14);border-radius:100px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.65);font-weight:400}
.pill-dot{width:5px;height:5px;border-radius:50%;background:#00ff88;flex-shrink:0;box-shadow:0 0 6px rgba(0,255,136,.6)}
.loader{width:100%;animation:fadeU .8s cubic-bezier(.16,1,.3,1) .4s both}
.lrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.lmsg{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.35);font-weight:300;letter-spacing:.3px}
.ldot{width:5px;height:5px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px rgba(0,255,136,.6);animation:dp 1.3s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.lpct{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:800;color:#00ff88;text-shadow:0 0 12px rgba(0,255,136,.4)}
.track{height:3px;background:rgba(255,255,255,.05);border-radius:100px;overflow:hidden;margin-bottom:8px}
.fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#009950,#00e676,#00ff88);box-shadow:0 0 10px rgba(0,255,136,.5);animation:bl 2.5s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes bl{0%{width:0}10%{width:8%}35%{width:38%}65%{width:67%}85%{width:85%}100%{width:100%}}
.foot{position:fixed;bottom:28px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1.5px;text-transform:uppercase;z-index:10;animation:fadeU .8s cubic-bezier(.16,1,.3,1) .6s both}
@keyframes fadeD{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeU{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.skip-login{
  position:fixed;
  bottom:64px;
  left:50%;
  transform:translateX(-50%);
  z-index:40;
  text-decoration:none;
  color:#04140b;
  background:#00ff88;
  border:1px solid rgba(0,255,136,.65);
  border-radius:999px;
  padding:10px 18px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;
  font-weight:800;
  letter-spacing:.8px;
  box-shadow:0 0 24px rgba(0,255,136,.25);
}
.skip-login:active{transform:translateX(-50%) scale(.98)}

</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var pct=0,el=document.querySelector('.lpct'),sp=document.querySelector('.lmsg span');
  var msgs=['Güvenlik başlatılıyor...','AI motoru yükleniyor...','Tehdit veritabanı aktif...','Koruma hazır!'];
  var mi=0;
  var iv=setInterval(function(){
    pct=Math.min(100,pct+Math.floor(Math.random()*4)+2);
    el.textContent=pct+'%';
    if(pct>22&&mi==0){mi=1;sp.textContent=msgs[1]}
    if(pct>55&&mi==1){mi=2;sp.textContent=msgs[2]}
    if(pct>=100){mi=3;sp.textContent=msgs[3];clearInterval(iv);setTimeout(function(){
      try { window.location.replace('/login?from=splash'); }
      catch(e) { window.location.href='/login?from=splash'; }
    },600)}
  },80);
});
</script>
</head>
<body>
<div class="bg"></div>
<div class="scan"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="pts" id="pts"></div>
<div class="page">
  <div class="top">
    <div class="shield-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="shield-bg">
        <svg width="44" height="50" viewBox="0 0 80 92" fill="none">
          <path d="M40 4L8 16V44C8 62.4 22.4 79.6 40 84C57.6 79.6 72 62.4 72 44V16L40 4Z" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M27 46L37 56L55 34" stroke="#00ff88" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="brand">
      <div class="brand-name">Erat<span>Guard</span></div>
      <div class="brand-line"></div>
      <div class="brand-sub">AI Spam Koruma Sistemi</div>
    </div>
  </div>
  <div class="mid">
    <div class="tagline">
      Her mesajı analiz eder,
      <em>tehditleri anında engeller.</em>
    </div>
    <div class="pills">
      <div class="pill"><div class="pill-dot"></div>AI Destekli Analiz</div>
      <div class="pill"><div class="pill-dot"></div>7/24 Koruma</div>
      <div class="pill"><div class="pill-dot"></div>Gerçek Zamanlı</div>
    </div>
  </div>
  <div class="loader">
    <div class="lrow">
      <div class="lmsg"><div class="ldot"></div><span>Güvenlik başlatılıyor...</span></div>
      <div class="lpct">0%</div>
    </div>
    <div class="track"><div class="fill"></div></div>
  </div>
</div>
<a class="skip-login" href="/login?from=splash">GİRİŞE GEÇ</a>
<div class="foot">EratGuard PRO · 2026 · AI Powered</div>
<script>
var c=document.getElementById('pts');
for(var i=0;i<22;i++){var p=document.createElement('div');p.className='pt';p.style.cssText='left:'+Math.random()*100+'%;bottom:'+Math.random()*70+'%;--d:'+(4+Math.random()*5)+'s;--dl:'+Math.random()*5+'s;width:'+(1+Math.random()*3)+'px;height:'+(1+Math.random()*3)+'px';c.appendChild(p)}
</script>
</body>
</html>
