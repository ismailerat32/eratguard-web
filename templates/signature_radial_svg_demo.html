<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>EratGuard Signature SVG Radial Demo V2</title>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial,Helvetica,sans-serif;
      color:#eaffef;
    }
    body{
      background:
        radial-gradient(circle at 50% 42%, rgba(70,255,140,.075), transparent 22%),
        radial-gradient(circle at 16% 70%, rgba(0,130,72,.09), transparent 24%),
        radial-gradient(circle at 84% 24%, rgba(0,110,80,.07), transparent 25%),
        linear-gradient(180deg,#020504 0%,#000 68%,#000 100%);
    }
    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(236,255,239,.95) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(65,255,135,.55) 0 1px, transparent 1.9px),
        radial-gradient(circle, rgba(255,255,255,.42) 0 1px, transparent 1.6px);
      background-size:82px 82px,137px 137px,211px 211px;
      opacity:.45;
    }
    .nebula{
      position:fixed;
      inset:-15%;
      pointer-events:none;
      background:
        radial-gradient(ellipse at 25% 68%, rgba(0,120,68,.13), transparent 32%),
        radial-gradient(ellipse at 78% 24%, rgba(0,95,72,.10), transparent 30%),
        radial-gradient(ellipse at 45% 52%, rgba(130,255,170,.055), transparent 35%);
      filter:blur(20px);
      opacity:.55;
    }
    .wrap{
      position:relative;
      width:100vw;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .radial{
      width:min(108vw,88dvh);
      height:min(108vw,88dvh);
      max-width:1180px;
      max-height:1180px;
      overflow:visible;
      filter:
        drop-shadow(0 0 7px rgba(120,255,160,.42))
        drop-shadow(0 0 20px rgba(0,150,85,.22));
      transform:translateY(1.0dvh);
    }
    .slice{
      fill:url(#sliceGrad);
      stroke:rgba(225,242,230,.60);
      stroke-width:2.15;
      filter:url(#sliceDepth);
      transform-origin:500px 500px;
      transition:transform .16s ease, opacity .16s ease, fill .16s ease;
    }
    .slice-link:active .slice,
    .slice-link:hover .slice{
      transform:scale(1.012);
      fill:url(#sliceHot);
    }
    .bevel{
      fill:none;
      stroke:rgba(245,255,248,.24);
      stroke-width:1.8;
      filter:url(#softGlow);
      pointer-events:none;
    }
    .outer-ring{
      fill:none;
      stroke:rgba(205,235,214,.54);
      stroke-width:5.4;
      filter:url(#ringGlow);
    }
    .inner-ring{
      fill:none;
      stroke:rgba(215,240,222,.38);
      stroke-width:2.2;
      filter:url(#softGlow);
    }
    .core{
      fill:url(#coreGrad);
      stroke:rgba(210,235,218,.72);
      stroke-width:4;
      filter:url(#strongGlow);
    }
    .core2{
      fill:none;
      stroke:rgba(200,230,210,.42);
      stroke-width:5.4;
      filter:url(#ringGlow);
    }
    .pro{
      fill:#f4f7f4;
      font-size:88px;
      font-weight:1000;
      text-anchor:middle;
      dominant-baseline:middle;
      letter-spacing:5px;
      paint-order:stroke;
      stroke:rgba(0,0,0,.78);
      stroke-width:7px;
      filter:url(#textGlow);
      pointer-events:none;
    }
    .icon{
      display:none;
    }
    .label{
      fill:#f1f4f1;
      font-size:28px;
      font-weight:800;
      text-anchor:middle;
      dominant-baseline:middle;
      paint-order:stroke;
      stroke:rgba(0,0,0,.78);
      stroke-width:3.1px;
      filter:url(#textGlow);
      pointer-events:none;
    }
  
    /* === V3.1 HARD DARK OVERRIDE START === */
    body{
      background:
        radial-gradient(circle at 50% 43%, rgba(85,180,120,.055), transparent 24%),
        radial-gradient(circle at 20% 70%, rgba(0,90,65,.06), transparent 28%),
        linear-gradient(180deg,#010302 0%,#000 72%,#000 100%) !important;
    }
    .nebula{
      opacity:.18 !important;
      filter:blur(26px) !important;
    }
    .radial{
      filter:
        drop-shadow(0 0 5px rgba(125,220,155,.28))
        drop-shadow(0 0 14px rgba(0,120,80,.16)) !important;
    }
    .slice{
      stroke:rgba(205,235,214,.48) !important;
      stroke-width:2.15 !important;
      filter:url(#softGlow) !important;
    }
    .outer-ring{
      stroke:rgba(178,220,190,.42) !important;
      stroke-width:5.4 !important;
    }
    .inner-ring{
      stroke:rgba(190,220,200,.34) !important;
      stroke-width:2 !important;
    }
    .core2{
      stroke:rgba(135,210,160,.34) !important;
      stroke-width:5.4 !important;
    }
    .core{
      stroke:rgba(210,230,215,.50) !important;
    }
    .label,.icon,.pro{
      filter:url(#textGlow) !important;
    }
    /* === V3.1 HARD DARK OVERRIDE END === */

  </style>
</head>

        <radialGradient id="sliceGrad" cx="30%" cy="18%" r="90%">
          <stop offset="0%" stop-color="#f1fff4"/>

          <stop offset="19%" stop-color="#293b30"/>

        <radialGradient id="coreGrad" cx="34%" cy="20%" r="82%">

        <filter id="sliceDepth" x="-35%" y="-35%" width="170%" height="170%">
          <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity=".72"/>
          <feDropShadow dx="0" dy="-2" stdDeviation="2" flood-color="#dfffe6" flood-opacity=".18"/>
          <feGaussianBlur stdDeviation=".35" result="microBlur"/>
          <feMerge>
            <feMergeNode in="SourceGraphic"/>

        </filter>

        <filter id="ringGlow" x="-35%" y="-35%" width="170%" height="170%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#c8ffd3" flood-opacity=".28"/>
          <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity=".60"/>
          <feMerge>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <filter id="sliceGlow" x="-35%" y="-35%" width="170%" height="170%">
          <feGaussianBlur stdDeviation="2.8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="strongGlow" x="-45%" y="-45%" width="190%" height="190%">
          <feGaussianBlur stdDeviation="2.8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.1" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="1.1" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
