<head>
  <meta charset="utf-8">

  <title>EratGuard Signature SVG Radial Demo V9</title>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial,Helvetica,sans-serif;
      color:#f3f7f3;
    }
    body{
      background:
        radial-gradient(circle at 50% 43%, rgba(125,190,145,.045), transparent 25%),
        radial-gradient(circle at 22% 72%, rgba(0,90,65,.05), transparent 28%),
        linear-gradient(180deg,#010302 0%,#000 72%,#000 100%);
    }
    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(230,235,232,.78) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(70,130,95,.42) 0 1px, transparent 1.8px);
      background-size:112px 112px,181px 181px;
      opacity:.48;
    }
    .wrap{
      position:relative;
      width:100vw;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .radial{
      width:min(108vw,88dvh);
      height:min(108vw,88dvh);
      max-width:1180px;
      max-height:1180px;
      overflow:visible;
      transform:translateY(1dvh);
      filter:
        drop-shadow(0 0 5px rgba(190,230,205,.26))
        drop-shadow(0 0 14px rgba(0,95,70,.18));
    }
    .slice-shadow{
      fill:rgba(0,0,0,.48);
      transform:translate(0,10px);
      filter:url(#shadowBlur);
      pointer-events:none;
    }
    .slice{
      fill:url(#sliceGrad);
      stroke:rgba(225,240,230,.62);
      stroke-width:2.35;
      filter:url(#sliceBlock3d);
      transform-origin:500px 500px;
      transition:transform .16s ease, fill .16s ease;
    }
    .slice-face{
      fill:url(#faceGrad);
      stroke:rgba(255,255,255,.14);
      stroke-width:1.3;
      filter:url(#faceInset);
      pointer-events:none;
    }
    .slice-link:active .slice,
    .slice-link:hover .slice{
      transform:scale(1.01);
      fill:url(#sliceHot);
    }
    .outer-ring{
      fill:none;
      stroke:rgba(218,238,224,.62);
      stroke-width:5.7;
      filter:url(#ringGlow);
    }
    .inner-ring{
      fill:none;
      stroke:rgba(218,238,224,.38);
      stroke-width:2.3;
      filter:url(#softGlow);
    }
    .core{
      fill:url(#coreGrad);
      stroke:rgba(225,240,230,.60);
      stroke-width:4.2;
      filter:url(#coreDepth);
    }
    .core2{
      fill:none;
      stroke:rgba(225,240,230,.56);
      stroke-width:6;
      filter:url(#ringGlow);
    }
    .pro{
      fill:#f4f7f4;
      font-size:90px;
      font-weight:1000;
      text-anchor:middle;
      dominant-baseline:middle;
      letter-spacing:5px;
      paint-order:stroke;
      stroke:rgba(0,0,0,.82);
      stroke-width:6px;
      filter:url(#textGlow);
      pointer-events:none;
    }
    .label{
      fill:#f1f4f1;
      font-size:25px;
      font-weight:850;
      text-anchor:middle;
      dominant-baseline:middle;
      paint-order:stroke;
      stroke:rgba(0,0,0,.82);
      stroke-width:2.8px;
      filter:url(#textGlow);
      pointer-events:none;
    }
    .line-icon{
      opacity:.82;
      transform-box:fill-box;
      transform-origin:center;
      pointer-events:none;
      filter:url(#textGlow);
    }
    .line-icon rect,
    .line-icon circle,
    .line-icon path{
      fill:none !important;
      stroke:#eef6f0;
      stroke-width:1.65;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
  </style>
