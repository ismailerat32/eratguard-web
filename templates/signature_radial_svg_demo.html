<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>EratGuard Signature SVG Radial Demo V2</title>
  <style>
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial,Helvetica,sans-serif;
      color:#eaffef;
    }
    body{
      background:
        radial-gradient(circle at 50% 40%, rgba(67,255,121,.20), transparent 24%),
        radial-gradient(circle at 17% 70%, rgba(0,255,99,.18), transparent 22%),
        radial-gradient(circle at 83% 22%, rgba(0,255,130,.13), transparent 24%),
        linear-gradient(180deg,#020b07 0%,#000 72%,#000 100%);
    }
    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(236,255,239,.95) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(65,255,135,.55) 0 1px, transparent 1.9px),
        radial-gradient(circle, rgba(255,255,255,.42) 0 1px, transparent 1.6px);
      background-size:82px 82px,137px 137px,211px 211px;
      opacity:.45;
    }
    .nebula{
      position:fixed;
      inset:-15%;
      pointer-events:none;
      background:
        radial-gradient(ellipse at 26% 68%, rgba(0,255,92,.30), transparent 31%),
        radial-gradient(ellipse at 78% 24%, rgba(0,255,120,.22), transparent 28%),
        radial-gradient(ellipse at 45% 52%, rgba(120,255,150,.14), transparent 34%);
      filter:blur(18px);
      opacity:.72;
    }
    .wrap{
      position:relative;
      width:100vw;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .radial{
      width:min(108vw,86dvh);
      height:min(108vw,86dvh);
      max-width:1180px;
      max-height:1180px;
      overflow:visible;
      filter:
        drop-shadow(0 0 10px rgba(85,255,125,.80))
        drop-shadow(0 0 28px rgba(0,255,100,.42));
      transform:translateY(-1.5dvh);
    }
    .slice{
      fill:url(#sliceGrad);
      stroke:rgba(198,255,207,.95);
      stroke-width:3.2;
      filter:url(#sliceGlow);
      transform-origin:500px 500px;
      transition:transform .16s ease, opacity .16s ease, fill .16s ease;
    }
    .slice-link:active .slice,
    .slice-link:hover .slice{
      transform:scale(1.018);
      fill:url(#sliceHot);
    }
    .bevel{
      fill:none;
      stroke:rgba(255,255,255,.30);
      stroke-width:1.4;
      filter:url(#softGlow);
      pointer-events:none;
    }
    .outer-ring{
      fill:none;
      stroke:rgba(99,255,138,.95);
      stroke-width:8;
      filter:url(#strongGlow);
    }
    .inner-ring{
      fill:none;
      stroke:rgba(190,255,207,.72);
      stroke-width:3;
      filter:url(#softGlow);
    }
    .core{
      fill:url(#coreGrad);
      stroke:rgba(226,255,231,.98);
      stroke-width:5;
      filter:url(#strongGlow);
    }
    .core2{
      fill:none;
      stroke:rgba(79,255,126,.88);
      stroke-width:9;
      filter:url(#strongGlow);
    }
    .pro{
      fill:#f1fff2;
      font-size:82px;
      font-weight:1000;
      text-anchor:middle;
      dominant-baseline:middle;
      letter-spacing:5px;
      paint-order:stroke;
      stroke:rgba(0,0,0,.78);
      stroke-width:10px;
      filter:url(#textGlow);
      pointer-events:none;
    }
    .icon{
      fill:#dffff0;
      font-size:42px;
      font-weight:900;
      text-anchor:middle;
      dominant-baseline:middle;
      paint-order:stroke;
      stroke:rgba(0,0,0,.72);
      stroke-width:6px;
      filter:url(#textGlow);
      pointer-events:none;
    }
    .label{
      fill:#f4fff6;
      font-size:27px;
      font-weight:900;
      text-anchor:middle;
      dominant-baseline:middle;
      paint-order:stroke;
      stroke:rgba(0,0,0,.78);
      stroke-width:7px;
      filter:url(#textGlow);
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="nebula"></div>
  <div class="wrap">
    <svg class="radial" viewBox="0 0 1000 1000" role="img" aria-label="EratGuard Signature SVG Radial Demo V2">
      <defs>
        <radialGradient id="sliceGrad" cx="38%" cy="28%" r="78%">
          <stop offset="0%" stop-color="#caffd3"/>
          <stop offset="25%" stop-color="#41ff82"/>
          <stop offset="58%" stop-color="#06933d"/>
          <stop offset="100%" stop-color="#03190d"/>
        </radialGradient>
        <radialGradient id="sliceHot" cx="38%" cy="28%" r="78%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="30%" stop-color="#91ffac"/>
          <stop offset="62%" stop-color="#00c854"/>
          <stop offset="100%" stop-color="#052510"/>
        </radialGradient>
        <radialGradient id="coreGrad" cx="38%" cy="28%" r="70%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="25%" stop-color="#acffbb"/>
          <stop offset="60%" stop-color="#16d85d"/>
          <stop offset="100%" stop-color="#05200e"/>
        </radialGradient>
        <filter id="sliceGlow" x="-35%" y="-35%" width="170%" height="170%">
          <feGaussianBlur stdDeviation="4.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="strongGlow" x="-45%" y="-45%" width="190%" height="190%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
