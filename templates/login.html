<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EratGuard — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:#020e07;font-family:'DM Sans',sans-serif;color:#fff}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,255,100,.1) 0%,transparent 55%),radial-gradient(ellipse 40% 30% at 90% 80%,rgba(0,180,80,.06) 0%,transparent 45%),#020e07}
.corner{position:fixed;width:18px;height:18px;z-index:3}
.corner.tl{top:14px;left:14px;border-top:1.5px solid rgba(0,255,136,.3);border-left:1.5px solid rgba(0,255,136,.3)}
.corner.tr{top:14px;right:14px;border-top:1.5px solid rgba(0,255,136,.3);border-right:1.5px solid rgba(0,255,136,.3)}
.corner.bl{bottom:14px;left:14px;border-bottom:1.5px solid rgba(0,255,136,.3);border-left:1.5px solid rgba(0,255,136,.3)}
.corner.br{bottom:14px;right:14px;border-bottom:1.5px solid rgba(0,255,136,.3);border-right:1.5px solid rgba(0,255,136,.3)}
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:52px 26px 40px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:40px;animation:fadeD .7s cubic-bezier(.16,1,.3,1) both}
.logo-box{width:44px;height:44px;border-radius:13px;background:linear-gradient(145deg,rgba(0,40,20,.9),rgba(0,20,10,.95));border:1.5px solid rgba(0,255,136,.25);display:grid;place-items:center;box-shadow:0 0 20px rgba(0,255,136,.1)}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.5px}
.brand-name span{color:#00ff88}
.brand-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:1px}
.welcome{width:100%;margin-bottom:32px;animation:fadeU .7s cubic-bezier(.16,1,.3,1) .1s both}
.welcome-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:8px}
.welcome-title span{color:#00ff88}
.welcome-sub{font-size:14px;color:rgba(255,255,255,.4);line-height:1.5;font-weight:300}
.form{width:100%;display:flex;flex-direction:column;gap:14px;animation:fadeU .7s cubic-bezier(.16,1,.3,1) .2s both}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.5px;text-transform:uppercase}
.input-wrap{position:relative}
.input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;pointer-events:none}
input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 16px 16px 46px;font-family:'DM Sans',sans-serif;font-size:15px;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;-webkit-appearance:none}
input[type=text]::placeholder,input[type=password]::placeholder{color:rgba(255,255,255,.2)}
input[type=text]:focus,input[type=password]:focus{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.04);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
.pass-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.35;transition:opacity .2s;padding:4px}
.pass-toggle:hover{opacity:.7}
.options{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.remember{display:flex;align-items:center;gap:8px;cursor:pointer}
.remember input[type=checkbox]{display:none}
.check-box{width:18px;height:18px;border-radius:6px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);display:grid;place-items:center;transition:all .2s;flex-shrink:0}
.remember input:checked+.check-box{background:#00ff88;border-color:#00ff88}
.remember input:checked+.check-box::after{content:'✓';font-size:11px;color:#000;font-weight:800}
.remember-label{font-size:13px;color:rgba(255,255,255,.4)}
.forgot{font-size:13px;color:rgba(0,255,136,.7);text-decoration:none;font-weight:500;transition:color .2s}
.forgot:hover{color:#00ff88}
.btn-submit{width:100%;margin-top:4px;background:linear-gradient(135deg,#00d966,#00ff88);color:#000;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:900;border:none;border-radius:16px;padding:17px;cursor:pointer;letter-spacing:.3px;box-shadow:0 8px 30px rgba(0,255,136,.25);transition:transform .15s;position:relative;overflow:hidden}
.btn-submit::before{content:'';position:absolute;top:-50%;left:-60%;width:35%;height:200%;background:rgba(255,255,255,.2);transform:skewX(-20deg);animation:shine 3s ease-in-out infinite 1.5s}
@keyframes shine{0%,100%{left:-60%}40%{left:120%}}
.btn-submit:active{transform:scale(.98)}
.divider{display:flex;align-items:center;gap:12px;margin:4px 0}
.div-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.div-text{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px;text-transform:uppercase}
.btn-register{width:100%;background:transparent;color:rgba(255,255,255,.6);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;cursor:pointer;transition:all .2s}
.btn-register:hover{border-color:rgba(0,255,136,.2);color:#00ff88}
.btn-register:active{transform:scale(.98)}
.error-box{display:none;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);border-radius:12px;padding:12px 14px;font-size:13px;color:#fca5a5;align-items:center;gap:8px;margin-bottom:4px}
.error-box.show{display:flex}
.foot{margin-top:32px;text-align:center;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:1.5px;text-transform:uppercase;animation:fadeU .7s cubic-bezier(.16,1,.3,1) .4s both}
@keyframes fadeD{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="page">
  <div class="header">
    <div class="logo-box">
      <svg width="24" height="27" viewBox="0 0 80 92" fill="none">
        <path d="M40 4L8 16V44C8 62.4 22.4 79.6 40 84C57.6 79.6 72 62.4 72 44V16L40 4Z" fill="rgba(0,255,136,0.12)" stroke="#00ff88" stroke-width="3" stroke-linejoin="round"/>
        <path d="M27 46L37 56L55 34" stroke="#00ff88" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Erat<span>Guard</span></div>
      <div class="brand-tag">AI Spam Koruma</div>
    </div>
  </div>
  <div class="welcome">
    <div class="welcome-title">Hoş geldin,<br><span>tekrar merhaba.</span></div>
    <div class="welcome-sub">Hesabına giriş yap, korumanı aktif tut.</div>
  </div>
  <div class="form">
    {% if error %}
    <div class="error-box show"><span>⚠️</span><span>{{ error }}</span></div>
    {% endif %}
    <form method="POST" action="/login">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="field">
          <label>Kullanıcı Adı</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="username" placeholder="Kullanıcı adını gir" autocomplete="username" required>
          </div>
        </div>
        <div class="field">
          <label>Şifre</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Şifreni gir" autocomplete="current-password" required>
            <button class="pass-toggle" type="button" onclick="togglePass()" id="passToggle">👁️</button>
          </div>
        </div>
        <div class="options">
          <label class="remember">
            <input type="checkbox" name="remember" id="rememberMe">
            <div class="check-box"></div>
            <span class="remember-label">Beni hatırla</span>
          </label>
          <a href="/forgot-password" class="forgot">Şifremi unuttum</a>
        </div>
        <button type="submit" class="btn-submit">Giriş Yap</button>
        <div class="divider"><div class="div-line"></div><div class="div-text">veya</div><div class="div-line"></div></div>
        <button type="button" class="btn-register" onclick="location.href='/register'">Hesap Oluştur</button>
      </div>
    </form>
  </div>
  <div class="foot">EratGuard PRO · 2026 · Güvenli Giriş · <a href="/legal">Gizlilik ve Koşullar</a></div>
</div>
<script>
function togglePass(){
  var inp=document.getElementById('password');
  var btn=document.getElementById('passToggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈'}
  else{inp.type='password';btn.textContent='👁️'}
}
</script>
</body>
</html>
