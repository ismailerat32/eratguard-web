<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Güncellendi - EratGuard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(35,105,255,.18), transparent 35%),
                radial-gradient(circle at bottom right, rgba(0,200,140,.16), transparent 35%),
                linear-gradient(135deg, #0f172a, #111827, #0b1220);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(17,24,39,.92);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,.45);
            padding: 30px;
            text-align: center;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: rgba(34,197,94,.16);
            border: 1px solid rgba(34,197,94,.28);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #86efac;
        }
        h1 { margin: 0 0 10px; color: #fff; }
        p { color: #9ca3af; line-height: 1.7; }
        a {
            display: inline-block;
            margin-top: 16px;
            padding: 14px 20px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Şifre Güncellendi</h1>
        <p>Yeni şifren artık aktif. Güvenlik nedeniyle sıfırlama bağlantısı kapatıldı.</p>
        <a href="/login">Giriş sayfasına dön</a>
    </div>
</body>
</html>
